<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#03030a">
<title>Wishlist · RAPI STORE</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root{
    --bg:#03030a;
    --surface:rgba(255,255,255,0.04);
    --border:rgba(255,255,255,0.09);
    --text:#F5F5FA;
    --text-muted:#8D8DA3;
    --rose:#FF4D8D;
    --violet:#7C5CFF;
    --cyan:#2DD4DA;
    --amber:#FFB020;
    --danger:#FF5C5C;
    --radius:18px;
    --font-display:'Syne', sans-serif;
    --font-body:'Space Grotesk', sans-serif;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ background:var(--bg); color:var(--text); min-height:100%; }
  body{
    font-family:var(--font-body);
    line-height:1.5;
    position:relative;
    overflow-x:hidden;
  }
  a{ color:inherit; text-decoration:none; }
  button{ font-family:inherit; border:none; background:none; cursor:pointer; color:inherit; }
  img{ display:block; max-width:100%; }
  :focus-visible{ outline:2px solid var(--rose); outline-offset:2px; border-radius:6px; }

  /* ---------- Background ambience ---------- */
  #stars{ position:fixed; inset:0; z-index:-2; display:block; }
  .aurora{ position:fixed; inset:0; z-index:-1; overflow:hidden; pointer-events:none; }
  .aurora span{ position:absolute; border-radius:50%; filter:blur(90px); opacity:.35; }
  .aurora .a1{ width:480px; height:480px; background:var(--violet); top:-160px; left:-120px; animation:drift1 22s ease-in-out infinite; }
  .aurora .a2{ width:420px; height:420px; background:var(--rose); bottom:-140px; right:-100px; animation:drift2 26s ease-in-out infinite; }
  .aurora .a3{ width:360px; height:360px; background:var(--cyan); top:38%; right:18%; animation:drift3 30s ease-in-out infinite; }
  @keyframes drift1{ 0%,100%{ transform:translate(0,0); } 50%{ transform:translate(60px,40px); } }
  @keyframes drift2{ 0%,100%{ transform:translate(0,0); } 50%{ transform:translate(-50px,-30px); } }
  @keyframes drift3{ 0%,100%{ transform:translate(0,0); } 50%{ transform:translate(-40px,50px); } }

  /* ---------- Topbar ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    max-width:1180px; margin:0 auto; padding:22px 24px 10px;
  }
  .brand{ font-family:var(--font-display); font-weight:800; font-size:1.1rem; letter-spacing:.4px; display:flex; align-items:center; gap:8px; }
  .brand .mark{ color:var(--violet); }
  .brand .accent{ color:var(--rose); }
  .topnav{ display:flex; align-items:center; gap:16px; }
  .nav-link{ font-size:.88rem; color:var(--text-muted); transition:color .2s; white-space:nowrap; }
  .nav-link:hover{ color:var(--text); }
  .count-chip{
    display:flex; align-items:center; gap:6px;
    background:var(--surface); border:1px solid var(--border);
    padding:7px 14px; border-radius:999px; font-size:.86rem; font-weight:600;
    backdrop-filter:blur(12px);
  }
  .chip-icon{ color:var(--rose); }

  /* ---------- Main container ---------- */
  main.container{ max-width:1180px; margin:0 auto; padding:0 24px; }

  .page-head{ margin:18px 0 26px; }
  .eyebrow{ font-family:var(--font-display); font-size:.76rem; letter-spacing:3px; color:var(--violet); font-weight:700; }
  .page-head h1{ font-family:var(--font-display); font-size:clamp(1.6rem,4vw,2.4rem); font-weight:800; margin:10px 0 8px; }
  .page-sub{ color:var(--text-muted); font-size:.96rem; }

  /* ---------- Discount banner (signature element) ---------- */
  .discount-banner{
    display:none; align-items:center; gap:14px;
    margin-bottom:26px; padding:18px 22px; border-radius:var(--radius);
    border:1px solid rgba(255,176,32,.35);
    background:linear-gradient(120deg, rgba(255,176,32,.12), rgba(255,77,141,.10));
  }
  .discount-banner.show{ display:flex; animation:bannerIn .5s ease, pulseGlow 3s ease-in-out infinite; }
  .banner-icon{ font-size:1.8rem; flex-shrink:0; }
  .banner-text{ display:flex; flex-direction:column; gap:2px; }
  .banner-text strong{ font-family:var(--font-display); font-size:1rem; }
  .banner-text span{ color:var(--text-muted); font-size:.86rem; }
  @keyframes bannerIn{ from{ opacity:0; transform:translateY(-8px); } to{ opacity:1; transform:translateY(0); } }
  @keyframes pulseGlow{ 0%,100%{ box-shadow:0 0 20px rgba(255,77,141,.08); } 50%{ box-shadow:0 0 38px rgba(255,77,141,.28); } }

  /* ---------- Grid & cards ---------- */
  .wishlist-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(252px,1fr));
    gap:20px; padding-bottom:60px;
  }
  .card{
    position:relative; background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); overflow:hidden; backdrop-filter:blur(16px);
    transition:transform .25s ease, border-color .25s ease, box-shadow .25s ease;
    animation:cardIn .5s ease both;
  }
  .card:hover{ transform:translateY(-4px); border-color:rgba(255,77,141,.4); box-shadow:0 14px 34px rgba(0,0,0,.35); }
  .card.removing{ animation:cardOut .26s ease forwards; }
  @keyframes cardIn{ from{ opacity:0; transform:translateY(14px); } to{ opacity:1; transform:translateY(0); } }
  @keyframes cardOut{ to{ opacity:0; transform:scale(.9); } }

  .card-media{ display:block; position:relative; aspect-ratio:4/3; overflow:hidden; }
  .card-media img{ width:100%; height:100%; object-fit:cover; transition:transform .4s ease; }
  .card:hover .card-media img{ transform:scale(1.06); }

  .badge-diskon{
    position:absolute; top:10px; left:10px;
    background:linear-gradient(120deg,var(--amber),var(--rose));
    color:#1a0a10; font-weight:700; font-size:.7rem; padding:5px 10px; border-radius:999px;
  }
  .btn-remove{
    position:absolute; top:10px; right:10px; width:32px; height:32px; border-radius:50%;
    background:rgba(8,8,14,.55); border:1px solid rgba(255,255,255,.15); color:#fff;
    font-size:.85rem; display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(6px); transition:background .2s, transform .2s; z-index:2;
  }
  .btn-remove:hover{ background:var(--danger); transform:scale(1.08); }

  .card-body{ padding:16px 16px 18px; display:flex; flex-direction:column; gap:6px; }
  .card-category{ font-size:.68rem; text-transform:uppercase; letter-spacing:1.4px; color:var(--text-muted); font-weight:600; }
  .card-title{
    font-family:var(--font-display); font-size:1.02rem; font-weight:700; line-height:1.3;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:2.6em;
  }
  .card-title:hover{ color:var(--rose); }
  .card-price{ display:flex; align-items:baseline; gap:8px; margin-top:2px; }
  .price-old{ font-size:.78rem; color:var(--text-muted); text-decoration:line-through; }
  .price-now{ font-family:var(--font-display); font-size:1.08rem; font-weight:800; color:var(--rose); }
  .btn-buy{
    margin-top:10px; width:100%; padding:11px 0; border-radius:12px;
    background:linear-gradient(120deg,var(--violet),var(--rose)); color:#fff;
    font-weight:700; font-size:.9rem; letter-spacing:.3px;
    transition:transform .2s, box-shadow .2s;
  }
  .btn-buy:hover{ transform:translateY(-2px); box-shadow:0 10px 24px rgba(255,77,141,.3); }
  .btn-buy:active{ transform:translateY(0); }

  /* ---------- Skeleton loading ---------- */
  .card.skeleton{ aspect-ratio:unset; height:300px; animation:none; }
  .card.skeleton::after{
    content:""; display:block; width:100%; height:100%;
    background:linear-gradient(110deg, rgba(255,255,255,.03) 8%, rgba(255,255,255,.09) 18%, rgba(255,255,255,.03) 33%);
    background-size:200% 100%; animation:shimmer 1.4s linear infinite;
  }
  @keyframes shimmer{ to{ background-position-x:-200%; } }

  /* ---------- Empty state ---------- */
  .empty-state{ text-align:center; padding:70px 20px 90px; display:flex; flex-direction:column; align-items:center; gap:10px; }
  .empty-icon{ font-size:2.6rem; margin-bottom:6px; }
  .empty-state h2{ font-family:var(--font-display); font-size:1.3rem; }
  .empty-state p{ color:var(--text-muted); max-width:380px; font-size:.92rem; }
  .btn-primary{
    margin-top:10px; padding:12px 26px; border-radius:999px;
    background:linear-gradient(120deg,var(--violet),var(--rose)); font-weight:700; color:#fff;
    font-size:.92rem; transition:transform .2s; display:inline-block;
  }
  .btn-primary:hover{ transform:translateY(-2px); }
  .is-hidden{ display:none !important; }

  /* ---------- Toast ---------- */
  .toast-container{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; gap:10px; z-index:50; align-items:center;
    padding:0 16px; width:100%; max-width:420px;
  }
  .toast{
    background:rgba(14,14,22,.92); border:1px solid var(--border); backdrop-filter:blur(14px);
    padding:12px 18px; border-radius:12px; font-size:.86rem; width:100%; text-align:center;
    opacity:0; transform:translateY(12px); transition:opacity .25s ease, transform .25s ease;
    box-shadow:0 10px 24px rgba(0,0,0,.4);
  }
  .toast.show{ opacity:1; transform:translateY(0); }
  .toast-success{ border-color:rgba(45,212,218,.4); }
  .toast-error{ border-color:rgba(255,92,92,.45); }
  .toast-discount{ border-color:rgba(255,176,32,.45); }

  /* ---------- Footer ---------- */
  .site-footer{ max-width:1180px; margin:0 auto; padding:30px 24px 50px; text-align:center; color:var(--text-muted); font-size:.82rem; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; }
  }

  @media (max-width:720px){
    .page-head h1{ font-size:1.5rem; }
    .wishlist-grid{ grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:14px; }
  }
  @media (max-width:480px){
    .topbar{ padding:18px 18px 8px; }
    main.container{ padding:0 18px; }
    .brand{ font-size:1rem; }
    .nav-link{ font-size:.8rem; }
    .wishlist-grid{ grid-template-columns:1fr 1fr; gap:12px; }
    .card-title{ font-size:.92rem; }
    .discount-banner{ padding:14px 16px; }
  }
  @media (max-width:380px){
    .wishlist-grid{ grid-template-columns:1fr; }
  }
</style>
</head>

  <!-- ====== Animasi bintang background ====== -->
  <script>
  (function(){
    const canvas = document.getElementById('stars');
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    let stars = [];

    function resize(){
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const count = Math.min(160, Math.floor((canvas.width * canvas.height) / 9000));
      stars = Array.from({ length: count }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.3 + 0.3,
        a: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.02 + 0.005
      }));
    }

    function draw(){
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ffffff';
      for(const s of stars){
        s.a += s.speed;
        ctx.globalAlpha = Math.abs(Math.sin(s.a)) * 0.7 + 0.15;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      if(!reduceMotion) requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    draw();
  })();
  </script>

  <!-- ====== Logika Wishlist + Firestore ====== -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore, collection, query, where, onSnapshot, doc, deleteDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    /* =========================================================
       KONFIGURASI FIREBASE
       Ganti object di bawah dengan config project Firebase kamu
       (Firebase Console → Project Settings → General → SDK setup)
    ========================================================= */
    const firebaseConfig = {
      apiKey: "AIzaSyBJJjcICAkbVWjrw5-zYMzcKqPGhS0nS0I",
      authDomain: "piwstore.firebaseapp.com",
      projectId: "piwstore",
      storageBucket: "piwstore.firebasestorage.app",
      messagingSenderId: "419258630997",
      appId: "1:419258630997:web:aefc0e34cc4b7ca16d25dc"
    };

    /* Nama collection Firestore tempat data wishlist disimpan.
       Struktur dokumen yang diharapkan:
       {
         deviceId: string,        // id perangkat (localStorage), untuk filter wishlist
         productId: string,       // id produk asli → dipakai di detail-produk.html#detail/:id
         name: string,
         category: string,
         image: string,           // url gambar produk
         price: number,           // harga jual (setelah diskon kalau ada)
         originalPrice: number,   // harga asli, samakan dengan price kalau tidak diskon
         createdAt: Timestamp     // dipakai untuk urutan terbaru
       }
    */
    const WISHLIST_COLLECTION = "wishlist";

    // Data contoh — tampil otomatis kalau firebaseConfig belum diisi / Firestore gagal diakses
    const DEMO_DATA = [
      { docId:"demo-1", productId:"bundle-50-tools", name:"Bundle 50 Tools GitHub Pages", category:"Bundle", image:"", price:89000, originalPrice:149000, createdAt:4 },
      { docId:"demo-2", productId:"smm-panel-laravel", name:"Source Code SMM Panel Laravel", category:"Full-Stack App", image:"", price:250000, originalPrice:350000, createdAt:3 },
      { docId:"demo-3", productId:"template-aurora-landing", name:"Template Landing Page Aurora", category:"Template", image:"", price:45000, originalPrice:45000, createdAt:2 },
      { docId:"demo-4", productId:"numvault-otp", name:"NUMVAULT — OTP Reseller Platform", category:"Full-Stack App", image:"", price:199000, originalPrice:199000, createdAt:1 }
    ];

    const DEVICE_KEY = "rapi_device_id";
    let db = null;
    let isDemoMode = false;
    let currentItems = [];
    let firstLoad = true;

    // ---------- Util ----------
    function uuid(){
      if(window.crypto && crypto.randomUUID) return crypto.randomUUID();
      return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0, v = c === "x" ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    function getDeviceId(){
      let id = localStorage.getItem(DEVICE_KEY);
      if(!id){
        id = "dev-" + uuid();
        localStorage.setItem(DEVICE_KEY, id);
      }
      return id;
    }

    function formatRupiah(n){
      return "Rp" + Number(n || 0).toLocaleString("id-ID");
    }

    function escapeHtml(str){
      return String(str ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
    }

    function getTime(t){
      if(!t) return 0;
      if(typeof t.toMillis === "function") return t.toMillis();
      if(typeof t === "number") return t;
      return 0;
    }

    function placeholderImage(){
      const emojis = ["🛒","📦","🧩","💾","🎨","⚙️"];
      const emoji = emojis[Math.floor(Math.random() * emojis.length)];
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300">
        <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#7C5CFF"/><stop offset="100%" stop-color="#FF4D8D"/>
        </linearGradient></defs>
        <rect width="100%" height="100%" fill="url(#g)"/>
        <text x="50%" y="56%" font-size="64" text-anchor="middle" dominant-baseline="middle">${emoji}</text>
      </svg>`;
      return "data:image/svg+xml;utf8," + encodeURIComponent(svg);
    }

    // ---------- Toast ----------
    function showToast(message, type = "success"){
      const container = document.getElementById("toastContainer");
      if(!container) return;
      const el = document.createElement("div");
      el.className = `toast toast-${type}`;
      el.textContent = message;
      container.appendChild(el);
      requestAnimationFrame(() => el.classList.add("show"));
      setTimeout(() => {
        el.classList.remove("show");
        setTimeout(() => el.remove(), 300);
      }, 3800);
    }

    // ---------- Render ----------
    function cardTemplate(item){
      const hasDiscount = item.originalPrice && item.originalPrice > item.price;
      const percent = hasDiscount ? Math.round((1 - item.price / item.originalPrice) * 100) : 0;
      const img = escapeHtml(item.image && item.image.trim() ? item.image : placeholderImage());
      const pid = encodeURIComponent(item.productId || "");
      return `
      <article class="card" data-doc="${escapeHtml(item.docId)}">
        <a class="card-media" href="detail-produk.html#detail/${pid}" aria-label="Lihat detail ${escapeHtml(item.name)}">
          <img src="${img}" alt="${escapeHtml(item.name)}" loading="lazy" onerror="this.onerror=null;this.src='${placeholderImage()}'">
          ${hasDiscount ? `<span class="badge-diskon">🔥 -${percent}%</span>` : ""}
        </a>
        <button class="btn-remove" data-doc="${escapeHtml(item.docId)}" aria-label="Hapus ${escapeHtml(item.name)} dari wishlist" title="Hapus dari wishlist">✕</button>
        <div class="card-body">
          <span class="card-category">${escapeHtml(item.category || "Produk")}</span>
          <a class="card-title" href="detail-produk.html#detail/${pid}">${escapeHtml(item.name)}</a>
          <div class="card-price">
            ${hasDiscount ? `<span class="price-old">${formatRupiah(item.originalPrice)}</span>` : ""}
            <span class="price-now">${formatRupiah(item.price)}</span>
          </div>
          <button class="btn-buy" data-pid="${escapeHtml(item.productId)}">Beli Sekarang</button>
        </div>
      </article>`;
    }

    function updateCount(n){
      const el = document.getElementById("countNum");
      if(el) el.textContent = n;
      document.title = n > 0 ? `Wishlist (${n}) · RAPI STORE` : "Wishlist · RAPI STORE";
    }

    function updateSavingsBanner(items){
      const banner = document.getElementById("discountBanner");
      if(!banner) return;
      const discounted = items.filter(i => i.originalPrice && i.originalPrice > i.price);
      if(discounted.length === 0){
        banner.classList.remove("show");
        banner.innerHTML = "";
        return;
      }
      const totalSavings = discounted.reduce((sum, i) => sum + (i.originalPrice - i.price), 0);
      banner.innerHTML = `
        <span class="banner-icon">🔥</span>
        <div class="banner-text">
          <strong>${discounted.length} produk kamu sedang diskon!</strong>
          <span>Hemat sampai ${formatRupiah(totalSavings)} kalau checkout sekarang</span>
        </div>`;
      banner.classList.add("show");
    }

    function renderAll(items){
      currentItems = items;
      const grid = document.getElementById("wishlistGrid");
      const empty = document.getElementById("emptyState");
      const sub = document.getElementById("pageSub");

      updateCount(items.length);
      updateSavingsBanner(items);

      if(sub){
        sub.textContent = items.length > 0
          ? `${items.length} produk nungguin buat di-checkout`
          : "Yuk mulai kumpulin produk favoritmu";
      }

      if(items.length === 0){
        grid.classList.add("is-hidden");
        empty.classList.remove("is-hidden");
        return;
      }
      empty.classList.add("is-hidden");
      grid.classList.remove("is-hidden");
      const sorted = [...items].sort((a, b) => getTime(b.createdAt) - getTime(a.createdAt));
      grid.innerHTML = sorted.map(cardTemplate).join("");
    }

    // ---------- Hapus dari wishlist ----------
    function removeFromWishlist(docId, cardEl){
      if(cardEl) cardEl.classList.add("removing");
      setTimeout(async () => {
        if(isDemoMode || !db){
          currentItems = currentItems.filter(i => i.docId !== docId);
          renderAll(currentItems);
          showToast("Dihapus dari wishlist", "success");
          return;
        }
        try {
          await deleteDoc(doc(db, WISHLIST_COLLECTION, docId));
          showToast("Dihapus dari wishlist", "success");
          // grid otomatis update lewat onSnapshot
        } catch (err) {
          console.error("[RAPI STORE] Gagal hapus wishlist:", err);
          if(cardEl) cardEl.classList.remove("removing");
          showToast("Gagal menghapus, coba lagi", "error");
        }
      }, 260);
    }

    // ---------- Event delegation ----------
    document.getElementById("wishlistGrid").addEventListener("click", (e) => {
      const removeBtn = e.target.closest(".btn-remove");
      if(removeBtn){
        removeFromWishlist(removeBtn.dataset.doc, removeBtn.closest(".card"));
        return;
      }
      const buyBtn = e.target.closest(".btn-buy");
      if(buyBtn){
        window.location.href = `detail-produk.html#detail/${encodeURIComponent(buyBtn.dataset.pid)}`;
      }
    });

    // ---------- Init ----------
    function isPlaceholderConfig(cfg){
      return !cfg.apiKey || cfg.apiKey.indexOf("YOUR_") === 0;
    }

    function startDemoMode(message){
      isDemoMode = true;
      if(message) console.info(message);
      renderAll(DEMO_DATA);
      const discounted = DEMO_DATA.filter(i => i.originalPrice > i.price);
      if(discounted.length > 0){
        showToast(`🔥 ${discounted.length} produk wishlist kamu sedang diskon!`, "discount");
      }
    }

    function init(){
      if(isPlaceholderConfig(firebaseConfig)){
        startDemoMode("[RAPI STORE] firebaseConfig belum diisi — menampilkan data contoh. Isi config Firebase di wishlist.html untuk konek ke Firestore asli.");
        return;
      }
      try {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        const deviceId = getDeviceId();
        const q = query(collection(db, WISHLIST_COLLECTION), where("deviceId", "==", deviceId));

        onSnapshot(q, (snap) => {
          const items = snap.docs.map(d => ({ docId: d.id, ...d.data() }));
          renderAll(items);
          if(firstLoad){
            firstLoad = false;
            const discounted = items.filter(i => i.originalPrice && i.originalPrice > i.price);
            if(discounted.length > 0){
              showToast(`🔥 ${discounted.length} produk wishlist kamu sedang diskon!`, "discount");
            }
          }
        }, (err) => {
          console.error("[RAPI STORE] Gagal memuat wishlist dari Firestore:", err);
          startDemoMode();
          showToast("Gagal konek ke Firestore, menampilkan data contoh", "error");
        });
      } catch (err) {
        console.error("[RAPI STORE] Firebase init error:", err);
        startDemoMode();
      }
    }

    const yearEl = document.getElementById("year");
    if(yearEl) yearEl.textContent = new Date().getFullYear();
    init();
  </script>

</body>
</html>
