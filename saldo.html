<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saldo — RAPI STORE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --bg: #0a0e14;
    --surface: #0f1620;
    --surface-2: #121a26;
    --surface-3: #161f2c;
    --line: #1c2630;
    --cyan: #22d3ee;
    --cyan-dim: #0d3b42;
    --gold: #d4af37;
    --gold-soft: #e8cf7a;
    --text: #f5f0e6;
    --text-dim: #8a95a3;
    --danger: #ef6f6f;
    --good: #7fe0c4;
    --radius: 14px;
    --sidebar-w: 240px;
  }

  *{ box-sizing: border-box; }
  html, body{
    margin: 0; padding: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
  a{ color: inherit; text-decoration: none; }
  ::-webkit-scrollbar{ width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb{ background: var(--line); border-radius: 4px; }

  .skip-link{ position:absolute; left:-9999px; }
  .skip-link:focus{ left: 8px; top: 8px; background: var(--cyan); color: #04161a; padding: 6px 10px; border-radius: 6px; z-index: 999; }

  /* ---------- ambience (purely visual, never intercepts clicks) ---------- */
  .bg-grid{
    position: fixed; inset: 0;
    background-image:
      linear-gradient(to right, rgba(34,211,238,0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(34,211,238,0.04) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: radial-gradient(ellipse 70% 50% at 100% 0%, black 30%, transparent 100%);
    pointer-events: none !important;
    z-index: 0;
  }
  .glow{
    position: fixed; width: 560px; height: 560px; border-radius: 50%;
    filter: blur(10px); opacity: 0.12;
    pointer-events: none !important;
    z-index: 0;
  }
  .glow-gold{ background: radial-gradient(circle, var(--gold), transparent 70%); top: -200px; right: -160px; }

  .app{ position: relative; z-index: 1; min-height: 100vh; }

  /* ---------- sidebar ---------- */
  .sidebar{
    position: fixed; top: 0; left: 0; bottom: 0;
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column;
    padding: 22px 16px;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    z-index: 60;
    overflow-y: auto;
  }
  .sidebar.open{ transform: translateX(0); }
  @media (min-width: 1024px){
    .sidebar{ transform: translateX(0); position: fixed; }
    .app{ margin-left: var(--sidebar-w); }
  }

  .sb-brand{ display:flex; align-items:center; gap: 10px; padding: 4px 8px 22px; }
  .mark{
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(140deg, var(--cyan-dim), var(--surface-2));
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .mark svg{ width: 16px; height: 16px; }
  .brand-name{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px; }
  .brand-name .accent{ color: var(--gold-soft); }

  .sb-nav{ display: flex; flex-direction: column; gap: 3px; flex: 1; }
  .sb-link{
    display: flex; align-items: center; gap: 11px;
    padding: 10px 12px; border-radius: 9px;
    font-size: 14px; font-weight: 500; color: var(--text-dim);
    transition: background 0.15s ease, color 0.15s ease;
    position: relative; z-index: 1;
  }
  .sb-link svg{ width: 17px; height: 17px; flex-shrink: 0; }
  .sb-link:hover{ background: var(--surface-2); color: var(--text); }
  .sb-link.active{ background: var(--surface-2); color: var(--cyan); }
  .sb-link.active svg{ color: var(--cyan); }

  .sb-foot{ border-top: 1px solid var(--line); padding-top: 14px; margin-top: 8px; }
  .btn-logout{
    width: 100%; display: flex; align-items: center; gap: 9px; justify-content: center;
    background: var(--surface-2); border: 1px solid var(--line);
    color: var(--text-dim); border-radius: 9px; padding: 10px 0;
    font-family: inherit; font-size: 13.5px; font-weight: 600; cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease;
  }
  .btn-logout:hover{ border-color: var(--danger); color: var(--danger); }
  .btn-logout svg{ width: 15px; height: 15px; }

  /* ---------- mobile-only backdrop ----------
     Default state: removed from layout entirely (display:none). */
  .backdrop{
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 55;
  }
  .backdrop.show{ display: block; }
  @media (min-width: 1024px){
    .backdrop{ display: none !important; }
  }

  /* ---------- mobile topbar ---------- */
  .topbar{
    position: sticky; top: 0; z-index: 40;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px;
    background: rgba(10,14,20,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
  }
  @media (min-width: 1024px){ .topbar{ display: none; } }
  .menu-btn{
    background: var(--surface-2); border: 1px solid var(--line); border-radius: 8px;
    width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
    color: var(--text); cursor: pointer;
  }
  .menu-btn svg{ width: 18px; height: 18px; }

  /* ---------- main ---------- */
  .main{ position: relative; z-index: 1; min-width: 0; padding: 26px 20px 60px; }
  @media (min-width: 1024px){ .main{ padding: 36px 40px 60px; } }

  .page-head{ margin-bottom: 24px; }
  .page-title{ font-family:'Space Grotesk',sans-serif; font-weight: 600; font-size: clamp(22px,2.6vw,28px); margin: 0 0 4px; }
  .page-sub{ color: var(--text-dim); font-size: 14px; margin: 0; }

  /* ---------- hero balance ---------- */
  .balance-hero{
    position: relative;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 36px 24px;
    text-align: center;
    margin-bottom: 18px;
    isolation: isolate;
    overflow: hidden;
  }
  .balance-hero::before{
    content: ''; position: absolute; inset: -1px; border-radius: inherit; padding: 1px;
    background: linear-gradient(135deg, var(--cyan) 0%, transparent 30%, transparent 70%, var(--gold) 100%);
    opacity: 0.5;
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    z-index: -1;
    pointer-events: none !important;
  }
  .balance-hero::after{
    content: '';
    position: absolute; top: -120px; left: 50%; transform: translateX(-50%);
    width: 360px; height: 360px; border-radius: 50%;
    background: radial-gradient(circle, rgba(212,175,55,0.10), transparent 70%);
    pointer-events: none !important;
    z-index: -1;
  }
  .balance-hero-label{ font-size: 13px; color: var(--text-dim); margin-bottom: 10px; letter-spacing: 0.02em; }
  .balance-hero-amount{
    font-family:'Space Grotesk',sans-serif; font-weight: 700;
    font-size: clamp(36px, 6vw, 52px);
    color: var(--gold-soft);
    margin-bottom: 6px;
    line-height: 1.1;
  }
  .balance-hero-sub{ font-size: 12.5px; color: var(--text-dim); }
  .balance-hero-sub.up{ color: var(--good); }
  .balance-hero-sub.down{ color: var(--danger); }

  .hero-actions{
    display: flex; gap: 12px; justify-content: center;
    margin-top: 22px; flex-wrap: wrap; position: relative; z-index: 1;
  }
  .btn-cta{
    display: inline-flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, var(--cyan) 0%, #0ea5b8 100%);
    color: #04161a; border: none; border-radius: 9px;
    padding: 11px 20px; font-size: 14px; font-weight: 600; font-family: inherit;
    cursor: pointer; transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn-cta:hover{ box-shadow: 0 6px 20px rgba(34,211,238,0.22); transform: translateY(-1px); }
  .btn-cta svg{ width: 15px; height: 15px; }

  .btn-outline{
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--surface-2); border: 1px solid var(--line);
    color: var(--text); border-radius: 9px;
    padding: 11px 20px; font-size: 14px; font-weight: 600; font-family: inherit;
    cursor: pointer; transition: border-color 0.15s ease, color 0.15s ease;
  }
  .btn-outline:hover{ border-color: var(--gold); color: var(--gold-soft); }
  .btn-outline svg{ width: 15px; height: 15px; }

  /* ---------- chart card ---------- */
  .chart-card{
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 20px;
    margin-bottom: 18px;
  }
  .chart-head{ display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; flex-wrap: wrap; gap: 10px; }
  .chart-title{ font-family:'Space Grotesk',sans-serif; font-weight: 600; font-size: 15px; margin: 0; }

  .range-tabs{ display: flex; gap: 4px; background: var(--surface-2); border: 1px solid var(--line); border-radius: 8px; padding: 3px; }
  .range-tab{
    border: none; background: none; color: var(--text-dim);
    font-family: inherit; font-size: 12px; font-weight: 600;
    padding: 6px 12px; border-radius: 6px; cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .range-tab.active{ background: var(--surface-3); color: var(--cyan); }

  .chart-wrap{ position: relative; height: 220px; margin-top: 12px; }
  canvas#balanceChart{ width: 100%; height: 100%; display: block; }
  .chart-empty{
    position: absolute; inset: 0; display: none;
    align-items: center; justify-content: center; flex-direction: column;
    color: var(--text-dim); font-size: 13px; gap: 8px;
  }
  .chart-empty.show{ display: flex; }
  .chart-empty svg{ width: 26px; height: 26px; }

  /* ---------- filter tabs ---------- */
  .filter-row{
    display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .filter-chip{
    border: 1px solid var(--line); background: var(--surface-2);
    color: var(--text-dim); font-family: inherit; font-size: 13px; font-weight: 600;
    padding: 8px 14px; border-radius: 99px; cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
  }
  .filter-chip.active{ background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }

  /* ---------- history list ---------- */
  .history-card{
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 20px;
  }
  .history-list{ display: flex; flex-direction: column; }
  .history-item{
    display: flex; align-items: center; gap: 13px;
    padding: 14px 0; border-bottom: 1px solid var(--line);
  }
  .history-item:last-child{ border-bottom: none; padding-bottom: 0; }
  .history-icon{
    width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface-2); border: 1px solid var(--line);
  }
  .history-icon svg{ width: 17px; height: 17px; }
  .history-icon.in svg{ color: var(--good); }
  .history-icon.out svg{ color: var(--danger); }
  .history-icon.pending svg{ color: var(--gold-soft); }
  .history-detail{ flex: 1; min-width: 0; }
  .history-title{ font-size: 14px; font-weight: 600; margin: 0 0 2px; }
  .history-meta{ font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
  .status-dot{ width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .status-dot.success{ background: var(--good); }
  .status-dot.pending{ background: var(--gold-soft); }
  .status-dot.failed{ background: var(--danger); }
  .history-amount{ font-family:'Space Grotesk',sans-serif; font-weight: 700; font-size: 14.5px; white-space: nowrap; }
  .history-amount.in{ color: var(--good); }
  .history-amount.out{ color: var(--danger); }

  .load-more{
    width: 100%; margin-top: 14px;
    background: var(--surface-2); border: 1px solid var(--line);
    color: var(--text); border-radius: 9px; padding: 11px 0;
    font-family: inherit; font-size: 13.5px; font-weight: 600; cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease;
  }
  .load-more:hover{ border-color: var(--cyan); color: var(--cyan); }
  .load-more:disabled{ opacity: 0.5; cursor: not-allowed; }

  .sk{
    background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 37%, var(--surface-2) 63%);
    background-size: 400% 100%;
    animation: shimmer 1.3s infinite;
    border-radius: 6px;
  }
  @keyframes shimmer{ 0%{ background-position: 100% 0; } 100%{ background-position: 0 0; } }

  .empty-state{
    text-align: center; padding: 40px 16px;
    color: var(--text-dim); font-size: 13.5px;
  }
  .empty-state svg{ width: 30px; height: 30px; margin-bottom: 12px; color: var(--text-dim); }

  .toast{
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface-2); border: 1px solid var(--line);
    color: var(--text); padding: 12px 18px; border-radius: 10px;
    font-size: 13.5px; display: flex; align-items: center; gap: 9px;
    opacity: 0; transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 80; box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    pointer-events: none;
  }
  .toast.show{ opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast svg{ width: 16px; height: 16px; flex-shrink: 0; }
  .toast.error svg{ color: var(--danger); }
  .toast.success svg{ color: var(--good); }
</style>
</head>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, doc, getDoc,
    collection, query, orderBy, limit, getDocs, startAfter
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBJJjcICAkbVWjrw5-zYMzcKqPGhS0nS0I",
    authDomain: "piwstore.firebaseapp.com",
    projectId: "piwstore"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // ---------- sidebar / mobile menu ----------
  const sidebar = document.getElementById('sidebar');
  const backdrop = document.getElementById('backdrop');
  const menuBtn = document.getElementById('menuBtn');

  function openMenu(){ sidebar.classList.add('open'); backdrop.classList.add('show'); }
  function closeMenu(){ sidebar.classList.remove('open'); backdrop.classList.remove('show'); }

  menuBtn.addEventListener('click', openMenu);
  backdrop.addEventListener('click', closeMenu);
  document.querySelectorAll('.sb-link').forEach(link => link.addEventListener('click', closeMenu));

  // ---------- toast ----------
  const toast = document.getElementById('toast');
  const toastText = document.getElementById('toastText');
  function showToast(msg, type){
    toastText.textContent = msg;
    toast.className = 'toast show ' + (type || '');
    setTimeout(() => toast.classList.remove('show'), 3200);
  }

  function formatRupiah(num){
    return 'Rp' + Number(num || 0).toLocaleString('id-ID');
  }

  function formatDateTime(ts){
    if(!ts) return '';
    const date = ts.toDate ? ts.toDate() : new Date(ts);
    return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }) +
      ' · ' + date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
  }

  // ---------- state ----------
  let currentUser = null;
  let allHistory = [];      // cached docs for chart + client-side filter
  let lastVisibleDoc = null;
  let activeFilter = 'all';
  let activeRange = 7;
  const PAGE_SIZE = 10;

  // ---------- auth gate ----------
  onAuthStateChanged(auth, async (user) => {
    if(!user){
      window.location.href = 'index.html#login';
      return;
    }
    currentUser = user;
    await loadBalance(user);
    await loadHistory(user, true);
  });

  // ---------- balance ----------
  async function loadBalance(user){
    const totalEl = document.getElementById('totalBalance');
    const trendEl = document.getElementById('balanceTrend');
    try{
      const snap = await getDoc(doc(db, 'users', user.uid));
      if(snap.exists()){
        const data = snap.data();
        totalEl.textContent = formatRupiah(data.balance);
        if(typeof data.balanceChange7d === 'number'){
          const change = data.balanceChange7d;
          trendEl.textContent = (change >= 0 ? '▲ ' : '▼ ') + formatRupiah(Math.abs(change)) + ' (7 hari terakhir)';
          trendEl.className = 'balance-hero-sub ' + (change >= 0 ? 'up' : 'down');
        }else{
          trendEl.textContent = 'Saldo dapat digunakan untuk transaksi di RAPI STORE.';
        }
      }else{
        totalEl.textContent = formatRupiah(0);
        trendEl.textContent = 'Saldo dapat digunakan untuk transaksi di RAPI STORE.';
      }
    }catch(err){
      totalEl.textContent = formatRupiah(0);
      trendEl.textContent = 'Gagal memuat saldo.';
      showToast('Gagal memuat saldo dari Firestore.', 'error');
      console.error(err);
    }
  }

  // ---------- history ----------
  const historyList = document.getElementById('historyList');
  const loadMoreBtn = document.getElementById('loadMoreBtn');

  const typeIcons = {
    topup:    { cls: 'in',  svg: '<path d="M12 19V5M5 12l7-7 7 7"/>' },
    withdraw: { cls: 'out', svg: '<path d="M12 5v14M5 12l7 7 7-7"/>' },
    transaksi:{ cls: 'out', svg: '<path d="M3 9l1.5-5h15L21 9"/><path d="M3 9h18v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9z"/>' },
    refund:   { cls: 'in',  svg: '<path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/>' }
  };

  const statusLabel = { success: 'Berhasil', pending: 'Diproses', failed: 'Gagal' };

  function renderHistoryItem(d){
    const typeInfo = typeIcons[d.type] || typeIcons.transaksi;
    const isIn = typeInfo.cls === 'in';
    const status = d.status || 'success';

    const item = document.createElement('div');
    item.className = 'history-item';
    item.dataset.type = d.type || 'transaksi';
    item.innerHTML = `
      <div class="history-icon ${typeInfo.cls} ${status === 'pending' ? 'pending' : ''}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${typeInfo.svg}</svg>
      </div>
      <div class="history-detail">
        <p class="history-title">${d.description || (isIn ? 'Saldo masuk' : 'Saldo keluar')}</p>
        <p class="history-meta">
          <span class="status-dot ${status}"></span>
          ${statusLabel[status] || status} · ${formatDateTime(d.createdAt)}
        </p>
      </div>
      <div class="history-amount ${isIn ? 'in' : 'out'}">${isIn ? '+' : '-'}${formatRupiah(d.amount)}</div>`;
    return item;
  }

  function renderList(docsData, append){
    if(!append) historyList.innerHTML = '';

    const filtered = activeFilter === 'all'
      ? docsData
      : docsData.filter(d => d.type === activeFilter);

    if(filtered.length === 0 && !append){
      historyList.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H7"/></svg>
          <p>Belum ada riwayat untuk filter ini.</p>
        </div>`;
      return;
    }

    filtered.forEach(d => historyList.appendChild(renderHistoryItem(d)));
  }

  async function loadHistory(user, isFirstLoad){
    try{
      let historyQuery;
      if(isFirstLoad || !lastVisibleDoc){
        historyQuery = query(
          collection(db, 'users', user.uid, 'balanceHistory'),
          orderBy('createdAt', 'desc'),
          limit(PAGE_SIZE)
        );
      }else{
        historyQuery = query(
          collection(db, 'users', user.uid, 'balanceHistory'),
          orderBy('createdAt', 'desc'),
          startAfter(lastVisibleDoc),
          limit(PAGE_SIZE)
        );
      }

      const snap = await getDocs(historyQuery);

      if(snap.empty && isFirstLoad){
        allHistory = [];
        renderList([], false);
        renderChart([]);
        loadMoreBtn.style.display = 'none';
        return;
      }

      const newDocs = [];
      snap.forEach(docSnap => newDocs.push(docSnap.data()));

      if(snap.docs.length > 0){
        lastVisibleDoc = snap.docs[snap.docs.length - 1];
      }

      allHistory = isFirstLoad ? newDocs : allHistory.concat(newDocs);
      renderList(allHistory, false);
      renderChart(allHistory);

      loadMoreBtn.style.display = snap.docs.length < PAGE_SIZE ? 'none' : 'block';
    }catch(err){
      if(isFirstLoad){
        historyList.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>
            <p>Gagal memuat riwayat saldo.</p>
          </div>`;
        renderChart([]);
      }
      showToast('Gagal memuat riwayat saldo dari Firestore.', 'error');
      console.error(err);
    }
  }

  loadMoreBtn.addEventListener('click', async () => {
    loadMoreBtn.disabled = true;
    loadMoreBtn.textContent = 'Memuat…';
    await loadHistory(currentUser, false);
    loadMoreBtn.disabled = false;
    loadMoreBtn.textContent = 'Muat lebih banyak';
  });

  // ---------- filter chips ----------
  document.getElementById('filterRow').addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-chip');
    if(!btn) return;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderList(allHistory, false);
  });

  // ---------- range tabs ----------
  document.getElementById('rangeTabs').addEventListener('click', (e) => {
    const btn = e.target.closest('.range-tab');
    if(!btn) return;
    document.querySelectorAll('.range-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    activeRange = Number(btn.dataset.range);
    renderChart(allHistory);
  });

  // ---------- canvas chart ----------
  const canvas = document.getElementById('balanceChart');
  const chartEmpty = document.getElementById('chartEmpty');
  const ctx = canvas.getContext('2d');

  function buildSeriesFromHistory(historyData, rangeDays){
    const now = new Date();
    const cutoff = new Date(now);
    cutoff.setDate(cutoff.getDate() - rangeDays);

    const points = historyData
      .map(d => {
        const date = d.createdAt && d.createdAt.toDate ? d.createdAt.toDate() : (d.createdAt ? new Date(d.createdAt) : null);
        return date ? { date, amount: Number(d.amount || 0), type: d.type } : null;
      })
      .filter(p => p && p.date >= cutoff)
      .sort((a, b) => a.date - b.date);

    let running = 0;
    return points.map(p => {
      const isIn = p.type === 'topup' || p.type === 'refund';
      running += isIn ? p.amount : -p.amount;
      return { x: p.date, y: running };
    });
  }

  function renderChart(historyData){
    const series = buildSeriesFromHistory(historyData, activeRange);

    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, rect.width, rect.height);

    if(series.length < 2){
      chartEmpty.classList.add('show');
      return;
    }
    chartEmpty.classList.remove('show');

    const padding = { top: 16, right: 12, bottom: 28, left: 12 };
    const w = rect.width - padding.left - padding.right;
    const h = rect.height - padding.top - padding.bottom;

    const values = series.map(p => p.y);
    let minY = Math.min(...values);
    let maxY = Math.max(...values);
    if(minY === maxY){ minY -= 1; maxY += 1; }
    const rangeY = maxY - minY;

    const xFor = (i) => padding.left + (i / (series.length - 1)) * w;
    const yFor = (val) => padding.top + h - ((val - minY) / rangeY) * h;

    // gridlines
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    for(let i = 0; i <= 3; i++){
      const gy = padding.top + (h / 3) * i;
      ctx.beginPath();
      ctx.moveTo(padding.left, gy);
      ctx.lineTo(padding.left + w, gy);
      ctx.stroke();
    }

    // area fill
    const gradient = ctx.createLinearGradient(0, padding.top, 0, padding.top + h);
    gradient.addColorStop(0, 'rgba(34,211,238,0.30)');
    gradient.addColorStop(1, 'rgba(34,211,238,0.0)');

    ctx.beginPath();
    ctx.moveTo(xFor(0), yFor(series[0].y));
    series.forEach((p, i) => ctx.lineTo(xFor(i), yFor(p.y)));
    ctx.lineTo(xFor(series.length - 1), padding.top + h);
    ctx.lineTo(xFor(0), padding.top + h);
    ctx.closePath();
    ctx.fillStyle = gradient;
    ctx.fill();

    // line
    ctx.beginPath();
    ctx.moveTo(xFor(0), yFor(series[0].y));
    series.forEach((p, i) => ctx.lineTo(xFor(i), yFor(p.y)));
    ctx.strokeStyle = '#22d3ee';
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.stroke();

    // end point dot
    const lastX = xFor(series.length - 1);
    const lastY = yFor(series[series.length - 1].y);
    ctx.beginPath();
    ctx.arc(lastX, lastY, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#d4af37';
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#0a0e14';
    ctx.stroke();

    // x-axis labels (first / last date)
    ctx.fillStyle = '#8a95a3';
    ctx.font = '11px Inter, sans-serif';
    ctx.textBaseline = 'top';

    const firstDate = series[0].x;
    const lastDate = series[series.length - 1].x;
    const fmt = (d) => d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });

    ctx.textAlign = 'left';
    ctx.fillText(fmt(firstDate), padding.left, padding.top + h + 8);
    ctx.textAlign = 'right';
    ctx.fillText(fmt(lastDate), padding.left + w, padding.top + h + 8);
  }

  window.addEventListener('resize', () => {
    if(allHistory) renderChart(allHistory);
  });

  // ---------- logout ----------
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    try{
      await signOut(auth);
      window.location.href = 'index.html#login';
    }catch(err){
      showToast('Gagal keluar. Coba lagi.', 'error');
      console.error(err);
    }
  });
</script>

</body>
</html>
