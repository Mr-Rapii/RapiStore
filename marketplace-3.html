<!DOCTYPE html>
<!--
  =========================================================
  RAPI STORE — MARKETPLACE
  =========================================================
  Sebelum dipakai:
  1. Isi object `firebaseConfig` di bagian <script type="module"> paling
     bawah file ini dengan config dari Firebase Console kamu.
  2. Buat koleksi Firestore bernama "products". Struktur field tiap
     dokumen ada di komentar tepat di atas firebaseConfig.
  3. Pastikan Firestore Security Rules mengizinkan baca publik untuk
     koleksi "products" (read-only), contoh dasar:
       match /products/{id} { allow read: if true; allow write: if false; }
  4. Kalau muncul error index di console browser saat ganti kategori/sort,
     klik link yang diberikan Firestore untuk membuat composite index.
  Halaman ini SENGAJA tidak diisi data dummy — grid akan otomatis
  menampilkan produk begitu koleksi "products" terisi di Firestore.
  =========================================================
-->
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace - RAPI STORE</title>
<meta name="description" content="Marketplace RAPI STORE — akun game, sosmed, followers, bahan editing, dan voucher.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#03030a;
    --bg-soft:#0b0b18;
    --glass:rgba(255,255,255,.045);
    --glass-border:rgba(255,255,255,.09);
    --text:#f5f3ff;
    --text-muted:#9a93b8;
    --violet:#6e3aff;
    --violet-2:#b14bff;
    --pink:#ff4fd8;
    --cyan:#34e4ea;
    --green:#3cf281;
    --red:#ff4d6d;
    --gold:#ffd166;
    --radius:16px;
    --font-display:'Syne',sans-serif;
    --font-body:'Space Grotesk',sans-serif;
  }

  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    margin:0; min-height:100vh; background:var(--bg); color:var(--text);
    font-family:var(--font-body); overflow-x:hidden;
  }
  .sr-only{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; }
  button, input, select{ font-family:var(--font-body); }
  button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible{
    outline:2px solid var(--violet-2); outline-offset:2px;
  }

  canvas#starCanvas{ position:fixed; inset:0; z-index:-2; }
  .aurora{ position:fixed; border-radius:50%; filter:blur(90px); opacity:.32; z-index:-1; pointer-events:none; }
  .aurora-1{ width:520px; height:520px; background:var(--violet); top:-160px; left:-120px; animation:float1 18s ease-in-out infinite; }
  .aurora-2{ width:480px; height:480px; background:var(--pink); bottom:-180px; right:-120px; animation:float2 22s ease-in-out infinite; }
  @keyframes float1{ 0%,100%{ transform:translate(0,0); } 50%{ transform:translate(60px,40px); } }
  @keyframes float2{ 0%,100%{ transform:translate(0,0); } 50%{ transform:translate(-50px,-60px); } }

  /* ---------- NAVBAR ---------- */
  .navbar{
    position:sticky; top:0; z-index:50;
    backdrop-filter:blur(16px);
    background:rgba(3,3,10,.6);
    border-bottom:1px solid var(--glass-border);
  }
  .nav-inner{
    max-width:1280px; margin:0 auto; padding:14px 24px;
    display:flex; align-items:center; gap:20px;
  }
  .logo{
    font-family:var(--font-display); font-weight:700; font-size:21px;
    letter-spacing:.3px; color:var(--text); text-decoration:none; white-space:nowrap;
  }
  .logo span{
    background:linear-gradient(90deg,var(--violet),var(--pink));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .search-wrap{
    flex:1; display:flex; align-items:center; gap:10px;
    background:var(--glass); border:1px solid var(--glass-border);
    border-radius:999px; padding:10px 16px; max-width:520px;
  }
  .search-wrap svg{ flex-shrink:0; opacity:.55; }
  .search-wrap input{
    background:none; border:none; outline:none; color:var(--text);
    font-size:14px; width:100%;
  }
  .search-wrap input::placeholder{ color:var(--text-muted); }
  .nav-actions{ display:flex; align-items:center; gap:10px; margin-left:auto; }
  .icon-btn{
    position:relative; display:flex; align-items:center; justify-content:center;
    width:42px; height:42px; border-radius:12px;
    background:var(--glass); border:1px solid var(--glass-border);
    color:var(--text); text-decoration:none; cursor:pointer; transition:.2s;
  }
  .icon-btn:hover{ background:rgba(255,255,255,.08); transform:translateY(-2px); }
  .icon-btn.active{ border-color:rgba(255,77,109,.5); color:var(--red); }
  .heart-path{ fill:none; stroke:currentColor; stroke-width:2; transition:.15s; }
  .icon-btn.active .heart-path, .heart-btn.active .heart-path{ fill:currentColor; stroke:none; }
  .badge{
    position:absolute; top:-6px; right:-6px; min-width:18px; height:18px; padding:0 4px;
    border-radius:999px; background:linear-gradient(135deg,var(--violet),var(--pink));
    font-size:11px; display:none; align-items:center; justify-content:center; color:#fff;
  }

  /* ---------- CATEGORIES ---------- */
  .categories-bar{ max-width:1280px; margin:0 auto; padding:18px 24px 0; }
  .chips{ display:flex; gap:10px; overflow-x:auto; scrollbar-width:none; padding-bottom:4px; }
  .chips::-webkit-scrollbar{ display:none; }
  .chip{
    flex-shrink:0; padding:9px 18px; border-radius:999px; border:1px solid var(--glass-border);
    background:var(--glass); color:var(--text-muted); font-size:13.5px; cursor:pointer; transition:.2s;
  }
  .chip:hover{ color:var(--text); border-color:rgba(255,255,255,.2); }
  .chip.active{
    background:linear-gradient(135deg,var(--violet),var(--violet-2)); color:#fff;
    border-color:transparent; box-shadow:0 0 22px rgba(110,58,255,.45);
  }

  /* ---------- TOOLBAR ---------- */
  .toolbar{
    max-width:1280px; margin:0 auto; padding:18px 24px 6px;
    display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
  }
  .toolbar-left{ display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .live-pill{
    display:flex; align-items:center; gap:7px; font-size:12.5px; color:var(--text-muted);
    background:var(--glass); border:1px solid var(--glass-border); padding:6px 12px; border-radius:999px;
  }
  .live-pill .dot{
    width:7px; height:7px; border-radius:50%; background:var(--green);
    box-shadow:0 0 8px var(--green); animation:pulse 1.6s infinite;
  }
  @keyframes pulse{ 0%,100%{ opacity:1; } 50%{ opacity:.3; } }
  .result-count{ font-size:13px; color:var(--text-muted); }
  #sortSelect{
    background:var(--glass); border:1px solid var(--glass-border); color:var(--text);
    padding:9px 14px; border-radius:10px; font-size:13.5px; cursor:pointer; outline:none;
  }
  #sortSelect option{ background:#0c0c18; color:var(--text); }

  /* ---------- GRID ---------- */
  .grid-wrap{ max-width:1280px; margin:0 auto; padding:18px 24px 10px; min-height:320px; }
  .product-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:20px; }

  .card{
    position:relative; background:var(--glass); border:1px solid var(--glass-border);
    border-radius:var(--radius); overflow:hidden; cursor:pointer; display:flex; flex-direction:column;
    transition:transform .25s, border-color .25s, box-shadow .25s;
  }
  .card:hover{ transform:translateY(-6px); border-color:rgba(255,255,255,.18); box-shadow:0 18px 40px rgba(110,58,255,.22); }
  .card-top-bar{
    position:absolute; top:0; left:0; right:0; height:3px; z-index:2;
    background:linear-gradient(90deg,var(--violet),var(--pink),var(--cyan),var(--violet));
    background-size:200% 100%; animation:barflow 6s linear infinite;
  }
  @keyframes barflow{ to{ background-position:200% 0; } }

  .card-img-wrap{ position:relative; aspect-ratio:4/3; overflow:hidden; background:var(--bg-soft); }
  .card-img{ width:100%; height:100%; object-fit:cover; display:block; transition:transform .4s; }
  .card:hover .card-img{ transform:scale(1.06); }
  .tag{
    position:absolute; top:10px; left:10px; font-size:11px; font-weight:600; padding:4px 10px;
    border-radius:999px; background:rgba(3,3,10,.65); border:1px solid var(--glass-border); backdrop-filter:blur(6px);
  }
  .tag-akun-game{ color:var(--cyan); }
  .tag-sosmed{ color:var(--pink); }
  .tag-followers{ color:var(--gold); }
  .tag-bahan-editing{ color:var(--green); }
  .tag-voucher{ color:var(--violet-2); }

  .heart-btn{
    position:absolute; top:10px; right:10px; width:34px; height:34px; border-radius:50%;
    border:1px solid var(--glass-border); background:rgba(3,3,10,.55); backdrop-filter:blur(6px);
    color:rgba(255,255,255,.55); display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:.2s;
  }
  .heart-btn:hover{ color:var(--red); }
  .heart-btn.active{ color:var(--red); border-color:rgba(255,77,109,.4); }
  .heart-btn.pop{ animation:heartPop .3s; }
  @keyframes heartPop{ 0%{ transform:scale(1); } 50%{ transform:scale(1.35); } 100%{ transform:scale(1); } }

  .stok-habis{
    position:absolute; bottom:10px; left:10px; font-size:11px; background:rgba(255,77,109,.18);
    color:var(--red); border:1px solid rgba(255,77,109,.4); padding:4px 10px; border-radius:999px;
  }

  .card-body{ padding:14px 14px 16px; display:flex; flex-direction:column; gap:8px; flex:1; }
  .card-title{
    font-size:14.5px; font-weight:600; margin:0; line-height:1.35; min-height:38px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }

  .rating{ position:relative; display:inline-block; font-size:13px; line-height:1; height:14px; }
  .stars-bg{ color:rgba(255,255,255,.15); letter-spacing:2px; }
  .stars-fg{ position:absolute; top:0; left:0; overflow:hidden; white-space:nowrap; color:var(--gold); letter-spacing:2px; }
  .rating-num{ margin-left:6px; color:var(--text-muted); font-size:12px; vertical-align:1px; }

  .card-meta{ display:flex; align-items:baseline; justify-content:space-between; margin-top:2px; gap:8px; }
  .price{
    font-family:var(--font-display); font-weight:700; font-size:17px;
    background:linear-gradient(90deg,#fff,var(--cyan)); -webkit-background-clip:text; background-clip:text; color:transparent;
    white-space:nowrap;
  }
  .stok{ font-size:11.5px; color:var(--text-muted); white-space:nowrap; }

  .btn-cart{
    margin-top:6px; width:100%; padding:10px; border-radius:10px; border:none;
    background:linear-gradient(135deg,var(--violet),var(--violet-2)); color:#fff;
    font-weight:600; font-size:13.5px; cursor:pointer; transition:.2s;
  }
  .btn-cart:hover{ filter:brightness(1.12); transform:translateY(-1px); }
  .btn-cart:disabled{ background:rgba(255,255,255,.08); color:var(--text-muted); cursor:not-allowed; transform:none; }

  /* ---------- SKELETON ---------- */
  .skeleton-shimmer{ position:relative; background:rgba(255,255,255,.05); overflow:hidden; border-radius:8px; }
  .skeleton-shimmer::after{
    content:""; position:absolute; inset:0; transform:translateX(-100%);
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);
    animation:shimmer 1.4s infinite;
  }
  @keyframes shimmer{ 100%{ transform:translateX(100%); } }
  .card.skeleton{ cursor:default; }
  .card.skeleton .card-img-wrap{ aspect-ratio:4/3; }
  .sk-line{ height:13px; border-radius:6px; }

  /* ---------- EMPTY / ERROR ---------- */
  .empty-state{
    grid-column:1/-1; text-align:center; padding:70px 20px;
    display:flex; flex-direction:column; align-items:center; gap:10px;
  }
  .empty-icon{ font-size:40px; opacity:.7; }
  .empty-state h3{ font-family:var(--font-display); font-size:20px; margin:4px 0 0; }
  .empty-state p{ color:var(--text-muted); font-size:13.5px; max-width:380px; line-height:1.6; margin:0; }
  .empty-state.error h3{ color:var(--red); }
  .btn-reset{
    margin-top:8px; padding:10px 22px; border-radius:999px; border:1px solid var(--glass-border);
    background:var(--glass); color:var(--text); cursor:pointer; font-size:13px; transition:.2s;
  }
  .btn-reset:hover{ border-color:var(--violet-2); color:var(--violet-2); }

  /* ---------- PAGINATION ---------- */
  .pagination{ display:flex; align-items:center; justify-content:center; gap:8px; padding:24px 24px 60px; flex-wrap:wrap; }
  .page-btn{
    min-width:38px; height:38px; padding:0 8px; border-radius:10px; border:1px solid var(--glass-border);
    background:var(--glass); color:var(--text); cursor:pointer; font-size:13.5px; transition:.2s;
  }
  .page-btn:hover:not(:disabled){ border-color:rgba(255,255,255,.25); }
  .page-btn.active{ background:linear-gradient(135deg,var(--violet),var(--violet-2)); border-color:transparent; }
  .page-btn:disabled{ opacity:.35; cursor:not-allowed; }
  .page-dots{ color:var(--text-muted); padding:0 4px; }

  /* ---------- TOAST ---------- */
  .toast-container{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; gap:8px; z-index:100; align-items:center;
  }
  .toast{
    background:rgba(15,15,26,.95); border:1px solid var(--glass-border); color:var(--text);
    padding:12px 20px; border-radius:999px; font-size:13px; opacity:0; transform:translateY(10px);
    transition:.3s; backdrop-filter:blur(10px); box-shadow:0 10px 30px rgba(0,0,0,.4); white-space:nowrap;
  }
  .toast.show{ opacity:1; transform:translateY(0); }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width:760px){
    .nav-inner{ flex-wrap:wrap; }
    .search-wrap{ order:3; max-width:100%; width:100%; }
    .nav-actions{ margin-left:0; }
    .toolbar{ flex-direction:column; align-items:flex-start; }
  }
  @media (prefers-reduced-motion:reduce){
    *, *::before, *::after{
      animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;
    }
  }
</style>
</head>
<body>

<canvas id="starCanvas"></canvas>
<div class="aurora aurora-1"></div>
<div class="aurora aurora-2"></div>

<header class="navbar">
  <div class="nav-inner">
    <a href="dashboard.html#dashboard" class="logo">RAPI<span>STORE</span></a>

    <div class="search-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input type="text" id="searchInput" placeholder="Cari produk, akun game, voucher..." autocomplete="off">
    </div>

    <div class="nav-actions">
      <button id="wishlistNavBtn" class="icon-btn" type="button" aria-label="Wishlist">
        <svg class="heart-svg" viewBox="0 0 24 24" width="17" height="17"><path class="heart-path" d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.8z"></path></svg>
        <span class="badge" id="wishlistBadge">0</span>
      </button>
      <a href="keranjang.html#keranjang" class="icon-btn" aria-label="Keranjang">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
        <span class="badge" id="cartBadge">0</span>
      </a>
      <a href="dashboard.html#dashboard" class="icon-btn" aria-label="Dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      </a>
    </div>
  </div>
</header>

<h1 class="sr-only">Marketplace RAPI STORE</h1>

<main>
  <section class="categories-bar">
    <div class="chips" id="categoryChips">
      <button class="chip active" data-category="Semua" type="button">Semua</button>
      <button class="chip" data-category="Akun Game" type="button">Akun Game</button>
      <button class="chip" data-category="Sosmed" type="button">Sosmed</button>
      <button class="chip" data-category="Followers" type="button">Followers</button>
      <button class="chip" data-category="Bahan Editing" type="button">Bahan Editing</button>
      <button class="chip" data-category="Voucher" type="button">Voucher</button>
    </div>
  </section>

  <section class="toolbar">
    <div class="toolbar-left">
      <span class="live-pill"><span class="dot"></span>Live dari Firestore</span>
      <span class="result-count" id="resultCount">Memuat produk...</span>
    </div>
    <div class="toolbar-right">
      <label for="sortSelect" class="sr-only">Urutkan</label>
      <select id="sortSelect">
        <option value="terbaru">Terbaru</option>
        <option value="terlaris">Terlaris</option>
        <option value="harga_rendah">Harga: Terendah</option>
        <option value="harga_tinggi">Harga: Tertinggi</option>
        <option value="rating">Rating Tertinggi</option>
      </select>
    </div>
  </section>

  <section class="grid-wrap">
    <div id="productGrid" class="product-grid" aria-live="polite"></div>
  </section>

  <nav class="pagination" id="pagination" aria-label="Navigasi halaman"></nav>
</main>

<div id="toastContainer" class="toast-container" aria-live="polite"></div>

<script type="module">
  // ============================================================
  // 🔥 FIREBASE — ganti firebaseConfig di bawah dengan config kamu
  // (Firebase Console > Project Settings > General > Your apps)
  // ============================================================
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import {
    getFirestore, collection, query, where, orderBy, limit, onSnapshot
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  /*
  ============================================================
  STRUKTUR DOKUMEN FIRESTORE — koleksi: "products"
  ============================================================
  nama       (string)    contoh: "Akun Mobile Legends 50 Skin"
  deskripsi  (string)    opsional, dipakai di halaman detail produk
  harga      (number)    contoh: 25000
  gambar     (string)    URL gambar produk
  kategori   (string)    "Akun Game" | "Sosmed" | "Followers" |
                          "Bahan Editing" | "Voucher"
  rating     (number)    0–5
  stok       (number)    jumlah stok tersedia
  terjual    (number)    jumlah unit terjual (dipakai sort "Terlaris")
  createdAt  (timestamp) serverTimestamp(), dipakai sort "Terbaru"

  Catatan: kombinasi where(kategori) + orderBy(field lain) butuh
  composite index. Kalau Firestore butuh itu, error di console
  browser akan berisi link untuk membuatnya otomatis.
  ============================================================
  */
  const firebaseConfig = {
    apiKey: "AIzaSyBJJjcICAkbVWjrw5-zYMzcKqPGhS0nS0I",
    authDomain: "piwstore.firebaseapp.com",
    projectId: "piwstore",
    storageBucket: "piwstore.firebasestorage.app",
    messagingSenderId: "419258630997",
    appId: "1:419258630997:web:aefc0e34cc4b7ca16d25dc"
  };

  let db = null;
  try {
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
  } catch (err) {
    console.error("Gagal inisialisasi Firebase:", err);
  }

  const PAGE_SIZE = 12;   // jumlah produk per halaman
  const MAX_FETCH = 200;  // batas dokumen yang ditarik per kategori+sort

  const HEART_SVG = '<svg class="heart-svg" viewBox="0 0 24 24" width="15" height="15"><path class="heart-path" d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.8z"></path></svg>';

  const state = {
    category: "Semua",
    sort: "terbaru",
    search: "",
    page: 1,
    wishlistOnly: false,
    allProducts: [],
    unsubscribe: null
  };

  const els = {
    grid: document.getElementById("productGrid"),
    resultCount: document.getElementById("resultCount"),
    pagination: document.getElementById("pagination"),
    searchInput: document.getElementById("searchInput"),
    sortSelect: document.getElementById("sortSelect"),
    chips: document.querySelectorAll(".chip"),
    cartBadge: document.getElementById("cartBadge"),
    wishlistBadge: document.getElementById("wishlistBadge"),
    wishlistNavBtn: document.getElementById("wishlistNavBtn"),
    toastContainer: document.getElementById("toastContainer")
  };

  /* ---------- LOCAL STORAGE: CART & WISHLIST ---------- */
  function getCart(){ try { return JSON.parse(localStorage.getItem("rapistore_cart")) || []; } catch { return []; } }
  function saveCart(cart){ localStorage.setItem("rapistore_cart", JSON.stringify(cart)); updateCartBadge(); }
  function getWishlist(){ try { return JSON.parse(localStorage.getItem("rapistore_wishlist")) || []; } catch { return []; } }
  function saveWishlist(list){ localStorage.setItem("rapistore_wishlist", JSON.stringify(list)); updateWishlistBadge(); }

  function updateCartBadge(){
    const count = getCart().reduce((sum,item)=>sum+(item.qty||1),0);
    els.cartBadge.textContent = count;
    els.cartBadge.style.display = count>0 ? "flex" : "none";
  }
  function updateWishlistBadge(){
    const count = getWishlist().length;
    els.wishlistBadge.textContent = count;
    els.wishlistBadge.style.display = count>0 ? "flex" : "none";
  }

  function addToCart(product){
    const cart = getCart();
    const existing = cart.find(i=>i.id===product.id);
    if (existing) existing.qty = (existing.qty||1)+1;
    else cart.push({ id:product.id, nama:product.nama, harga:product.harga, gambar:product.gambar, qty:1 });
    saveCart(cart);
    showToast(`"${product.nama}" ditambahkan ke keranjang`);
  }

  function toggleWishlist(id, heartBtn){
    let list = getWishlist();
    if (list.includes(id)) {
      list = list.filter(x=>x!==id);
      heartBtn?.classList.remove("active");
    } else {
      list.push(id);
      heartBtn?.classList.add("active","pop");
      setTimeout(()=>heartBtn?.classList.remove("pop"), 300);
    }
    saveWishlist(list);
    if (state.wishlistOnly) applyFiltersAndRender();
  }

  /* ---------- TOAST ---------- */
  function showToast(message){
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.textContent = message;
    els.toastContainer.appendChild(toast);
    requestAnimationFrame(()=>toast.classList.add("show"));
    setTimeout(()=>{
      toast.classList.remove("show");
      setTimeout(()=>toast.remove(), 300);
    }, 2400);
  }

  /* ---------- HELPERS ---------- */
  const formatRupiah = (n) => "Rp" + Number(n||0).toLocaleString("id-ID");
  const categorySlug = (k) => (k||"").toLowerCase().replace(/\s+/g,"-");
  function escapeHTML(str=""){
    return String(str).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  /* ---------- RENDER: SKELETON ---------- */
  function renderSkeleton(){
    els.grid.innerHTML = Array.from({length: PAGE_SIZE}).map(()=>`
      <div class="card skeleton">
        <div class="card-img-wrap skeleton-shimmer"></div>
        <div class="card-body">
          <div class="sk-line skeleton-shimmer" style="width:75%"></div>
          <div class="sk-line skeleton-shimmer" style="width:40%"></div>
          <div class="sk-line skeleton-shimmer" style="width:100%;height:34px;margin-top:8px"></div>
        </div>
      </div>
    `).join("");
    els.resultCount.textContent = "Memuat produk...";
    els.pagination.innerHTML = "";
  }

  /* ---------- RENDER: EMPTY / ERROR ---------- */
  function renderEmpty(){
    const msg = state.wishlistOnly
      ? "Kamu belum menyimpan produk apa pun ke wishlist."
      : "Produk untuk filter ini belum tersedia. Tambahkan data lewat Firestore Console, atau coba kategori dan pencarian lain.";
    els.grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🛍️</div>
        <h3>Belum ada produk di sini</h3>
        <p>${msg}</p>
        <button class="btn-reset" id="resetFilterBtn" type="button">Reset Filter</button>
      </div>
    `;
    els.resultCount.textContent = "0 produk ditemukan";
    els.pagination.innerHTML = "";
    document.getElementById("resetFilterBtn")?.addEventListener("click", resetFilters);
  }

  function renderError(message){
    els.grid.innerHTML = `
      <div class="empty-state error">
        <div class="empty-icon">⚠️</div>
        <h3>Gagal memuat produk</h3>
        <p>${escapeHTML(message)}</p>
      </div>
    `;
    els.resultCount.textContent = "Terjadi kesalahan";
    els.pagination.innerHTML = "";
  }

  /* ---------- RENDER: CARD ---------- */
  function starsHTML(rating){
    const pct = Math.max(0, Math.min(5, Number(rating)||0)) / 5 * 100;
    return `
      <div class="rating">
        <div class="stars-bg">★★★★★</div>
        <div class="stars-fg" style="width:${pct}%">★★★★★</div>
        <span class="rating-num">${Number(rating||0).toFixed(1)}</span>
      </div>
    `;
  }

  function cardHTML(p){
    const outOfStock = !p.stok || p.stok <= 0;
    const inWishlist = getWishlist().includes(p.id);
    const img = p.gambar || "https://placehold.co/400x300/0b0b18/6e3aff?text=RAPI+STORE";
    return `
      <article class="card" data-id="${p.id}">
        <div class="card-top-bar"></div>
        <div class="card-img-wrap">
          <img class="card-img" src="${img}" alt="${escapeHTML(p.nama||"Produk")}" loading="lazy" onerror="this.src='https://placehold.co/400x300/0b0b18/6e3aff?text=RAPI+STORE'">
          <span class="tag tag-${categorySlug(p.kategori)}">${escapeHTML(p.kategori||"-")}</span>
          <button class="heart-btn ${inWishlist?'active':''}" data-action="wishlist" type="button" aria-label="Wishlist">${HEART_SVG}</button>
          ${outOfStock ? '<span class="stok-habis">Stok Habis</span>' : ''}
        </div>
        <div class="card-body">
          <h3 class="card-title">${escapeHTML(p.nama||"Tanpa nama")}</h3>
          ${starsHTML(p.rating)}
          <div class="card-meta">
            <span class="price">${formatRupiah(p.harga)}</span>
            <span class="stok">Stok: ${p.stok ?? 0}</span>
          </div>
          <button class="btn-cart" data-action="cart" type="button" ${outOfStock?'disabled':''}>
            ${outOfStock ? 'Stok Habis' : 'Tambah ke Keranjang'}
          </button>
        </div>
      </article>
    `;
  }

  /* ---------- RENDER: GRID + PAGINATION ---------- */
  function applyFiltersAndRender(){
    let filtered = state.allProducts;

    if (state.wishlistOnly) {
      const wl = getWishlist();
      filtered = filtered.filter(p=>wl.includes(p.id));
    }
    if (state.search.trim()) {
      const q = state.search.trim().toLowerCase();
      filtered = filtered.filter(p=>(p.nama||"").toLowerCase().includes(q));
    }

    if (filtered.length === 0) { renderEmpty(); return; }

    const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
    state.page = Math.min(Math.max(1, state.page), totalPages);

    const start = (state.page-1)*PAGE_SIZE;
    const pageItems = filtered.slice(start, start+PAGE_SIZE);

    els.grid.innerHTML = pageItems.map(cardHTML).join("");
    els.resultCount.textContent = `${filtered.length} produk ditemukan`;
    renderPagination(totalPages);
  }

  function renderPagination(totalPages){
    if (totalPages <= 1) { els.pagination.innerHTML = ""; return; }
    let html = `<button class="page-btn" data-page="prev" ${state.page===1?'disabled':''} aria-label="Sebelumnya">‹</button>`;
    for (let i=1; i<=totalPages; i++){
      const edge = i===1 || i===totalPages;
      const near = Math.abs(i-state.page) <= 1;
      if (!edge && !near) {
        if (i===2 || i===totalPages-1) html += `<span class="page-dots">…</span>`;
        continue;
      }
      html += `<button class="page-btn ${i===state.page?'active':''}" data-page="${i}">${i}</button>`;
    }
    html += `<button class="page-btn" data-page="next" ${state.page===totalPages?'disabled':''} aria-label="Berikutnya">›</button>`;
    els.pagination.innerHTML = html;
  }

  /* ---------- FIRESTORE QUERY ---------- */
  function sortToOrderBy(sortKey){
    switch(sortKey){
      case "terlaris": return ["terjual","desc"];
      case "harga_rendah": return ["harga","asc"];
      case "harga_tinggi": return ["harga","desc"];
      case "rating": return ["rating","desc"];
      default: return ["createdAt","desc"];
    }
  }

  function subscribeProducts(){
    if (!db) {
      renderError("Firebase belum dikonfigurasi. Isi firebaseConfig di dalam script terlebih dahulu.");
      return;
    }
    if (state.unsubscribe) { state.unsubscribe(); state.unsubscribe = null; }
    renderSkeleton();

    const [field, direction] = sortToOrderBy(state.sort);
    const constraints = [];
    if (state.category !== "Semua") constraints.push(where("kategori","==",state.category));
    constraints.push(orderBy(field, direction));
    constraints.push(limit(MAX_FETCH));

    const q = query(collection(db, "products"), ...constraints);

    state.unsubscribe = onSnapshot(q,
      (snapshot)=>{
        state.allProducts = snapshot.docs.map(d=>({ id:d.id, ...d.data() }));
        applyFiltersAndRender();
      },
      (error)=>{
        console.error("Firestore error:", error);
        renderError("Periksa konfigurasi Firestore, security rules, atau composite index (cek console browser untuk link pembuatan index otomatis).");
      }
    );
  }

  /* ---------- EVENTS ---------- */
  els.grid.addEventListener("click", (e)=>{
    const card = e.target.closest(".card");
    if (!card) return;
    const id = card.dataset.id;
    if (!id) return;

    const action = e.target.closest("[data-action]")?.dataset.action;
    if (action === "wishlist") {
      e.stopPropagation();
      toggleWishlist(id, e.target.closest(".heart-btn"));
      return;
    }
    if (action === "cart") {
      e.stopPropagation();
      const product = state.allProducts.find(p=>p.id===id);
      if (product) addToCart(product);
      return;
    }
    window.location.href = `detail-produk.html#detail/${id}`;
  });

  els.pagination.addEventListener("click", (e)=>{
    const btn = e.target.closest(".page-btn");
    if (!btn || btn.disabled) return;
    const p = btn.dataset.page;
    if (p === "prev") state.page -= 1;
    else if (p === "next") state.page += 1;
    else state.page = Number(p);
    applyFiltersAndRender();
    document.querySelector(".grid-wrap")?.scrollIntoView({ behavior:"smooth", block:"start" });
  });

  let searchDebounce;
  els.searchInput.addEventListener("input", (e)=>{
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(()=>{
      state.search = e.target.value;
      state.page = 1;
      applyFiltersAndRender();
    }, 300);
  });

  els.sortSelect.addEventListener("change", (e)=>{
    state.sort = e.target.value;
    state.page = 1;
    subscribeProducts();
  });

  els.chips.forEach(chip=>{
    chip.addEventListener("click", ()=>{
      els.chips.forEach(c=>c.classList.remove("active"));
      chip.classList.add("active");
      state.category = chip.dataset.category;
      state.page = 1;
      subscribeProducts();
    });
  });

  els.wishlistNavBtn.addEventListener("click", ()=>{
    state.wishlistOnly = !state.wishlistOnly;
    els.wishlistNavBtn.classList.toggle("active", state.wishlistOnly);
    state.page = 1;
    applyFiltersAndRender();
  });

  function resetFilters(){
    state.category = "Semua"; state.sort = "terbaru"; state.search = "";
    state.page = 1; state.wishlistOnly = false;
    els.searchInput.value = ""; els.sortSelect.value = "terbaru";
    els.chips.forEach(c=>c.classList.toggle("active", c.dataset.category==="Semua"));
    els.wishlistNavBtn.classList.remove("active");
    subscribeProducts();
  }

  /* ---------- INIT ---------- */
  updateCartBadge();
  updateWishlistBadge();
  subscribeProducts();

  /* ---------- STAR CANVAS BACKGROUND ---------- */
  (function starField(){
    const canvas = document.getElementById("starCanvas");
    const ctx = canvas.getContext("2d");
    let stars = [];
    function resize(){
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      stars = Array.from({ length: Math.floor((canvas.width*canvas.height)/9000) }, ()=>({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*1.4+0.2,
        a: Math.random(),
        speed: Math.random()*0.015+0.003
      }));
    }
    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = "#ffffff";
      stars.forEach(s=>{
        s.a += s.speed;
        ctx.globalAlpha = Math.abs(Math.sin(s.a))*0.8;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
      requestAnimationFrame(draw);
    }
    window.addEventListener("resize", resize);
    resize();
    if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) draw();
  })();
</script>
</body>
</html>
