<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flash Sale ⚡ RAPI STORE</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">

<!-- Firebase SDK (modular, sama dengan marketplace.html) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import {
  getAuth, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
import {
  getFirestore, collection, query, where, limit, getDocs,
  doc, getDoc, setDoc, increment, serverTimestamp, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBJJjcICAkbVWjrw5-zYMzcKqPGhS0nS0I",
  authDomain: "piwstore.firebaseapp.com",
  projectId: "piwstore",
  storageBucket: "piwstore.firebasestorage.app",
  messagingSenderId: "419258630997",
  appId: "1:419258630997:web:aefc0e34cc4b7ca16d25dc",
  measurementId: "G-M6NHQMHQV4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* =========================================================
   STATE
========================================================= */
let currentUser = null;
let flashItems = [];     // produk dengan flashSale:true
let countdownTimer = null;
let notifEnabled = false;

const fmtPrice = (n) => new Intl.NumberFormat("id-ID", { style:"currency", currency:"IDR", minimumFractionDigits:0 }).format(n || 0);

/* ---------------- dom refs ---------------- */
const grid = document.getElementById("flashGrid");
const toast = document.getElementById("toast");
const toastMsg = document.getElementById("toastMsg");
const cdHours = document.getElementById("cdHours");
const cdMinutes = document.getElementById("cdMinutes");
const cdSeconds = document.getElementById("cdSeconds");
const cdLabel = document.getElementById("cdLabel");
const heroBanner = document.getElementById("heroBanner");
const notifBtn = document.getElementById("notifBtn");
const resultCount = document.getElementById("resultCount");

function showToast(msg, isError){
  toastMsg.textContent = msg;
  toast.classList.toggle("err", !!isError);
  toast.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=> toast.classList.remove("show"), 2600);
}

function tsToMillis(v){
  if (!v) return 0;
  if (typeof v.toMillis === "function") return v.toMillis();
  if (v.seconds) return v.seconds * 1000;
  return 0;
}

/* =========================================================
   AUTH (opsional — flash sale tetap bisa dilihat tanpa login,
   notifikasi & beli butuh login)
========================================================= */
onAuthStateChanged(auth, (user) => {
  currentUser = user;
  checkNotifStatus();
});

/* =========================================================
   LOAD FLASH SALE PRODUCTS
   Pola data: products/{id} dengan field tambahan:
   flashSale:true, flashSalePrice, flashSaleStock, flashSaleEnd
========================================================= */
async function loadFlashSale(){
  renderSkeleton();
  try{
    const col = collection(db, "products");
    const q = query(col, where("flashSale", "==", true), limit(60));
    const snap = await getDocs(q);

    flashItems = [];
    snap.forEach(d => flashItems.push({ id: d.id, ...d.data() }));

    // buang item yang sudah lewat waktu flash sale-nya
    const now = Date.now();
    flashItems = flashItems.filter(p => {
      const end = tsToMillis(p.flashSaleEnd);
      return !end || end > now;
    });

    // urutkan: stok paling sedikit (paling mendesak) duluan
    flashItems.sort((a,b) => (a.flashSaleStock ?? a.stock ?? 0) - (b.flashSaleStock ?? b.stock ?? 0));

    renderGrid();
    setupCountdown();

  }catch(e){
    console.error(e);
    grid.innerHTML = "";
    renderEmpty("Gagal memuat flash sale", "Periksa koneksi internet atau coba muat ulang halaman.");
    resultCount.textContent = "";
  }
}

/* =========================================================
   COUNTDOWN — pakai flashSaleEnd terdekat dari semua produk
========================================================= */
function setupCountdown(){
  clearInterval(countdownTimer);

  const ends = flashItems.map(p => tsToMillis(p.flashSaleEnd)).filter(Boolean);
  if (ends.length === 0){
    cdLabel.textContent = "Flash sale sedang berlangsung";
    cdHours.textContent = "--";
    cdMinutes.textContent = "--";
    cdSeconds.textContent = "--";
    return;
  }

  const targetEnd = Math.min(...ends);
  cdLabel.textContent = "Berakhir dalam";

  function tick(){
    const diff = targetEnd - Date.now();
    if (diff <= 0){
      clearInterval(countdownTimer);
      cdHours.textContent = "00";
      cdMinutes.textContent = "00";
      cdSeconds.textContent = "00";
      cdLabel.textContent = "Flash sale telah berakhir";
      heroBanner.classList.add("ended");
      showToast("⏰ Flash sale telah berakhir");
      loadFlashSale(); // refresh agar item kadaluarsa tersaring
      return;
    }
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    cdHours.textContent = String(h).padStart(2,'0');
    cdMinutes.textContent = String(m).padStart(2,'0');
    cdSeconds.textContent = String(s).padStart(2,'0');
  }
  tick();
  countdownTimer = setInterval(tick, 1000);
}

/* =========================================================
   RENDER
========================================================= */
function renderSkeleton(){
  grid.innerHTML = "";
  for (let i=0;i<8;i++){
    const el = document.createElement("div");
    el.className = "skeleton-card";
    el.innerHTML = `
      <div class="skeleton-media"></div>
      <div class="skeleton-lines">
        <div class="skeleton-line w80"></div>
        <div class="skeleton-line w60"></div>
        <div class="skeleton-line w40"></div>
      </div>`;
    grid.appendChild(el);
  }
  resultCount.textContent = "";
}

function renderEmpty(title, sub){
  const el = document.createElement("div");
  el.className = "empty-state";
  el.innerHTML = `<div class="empty-icon">⚡</div><h3>${title}</h3><p>${sub}</p>
    <a href="marketplace.html#marketplace" class="btn-browse">Lihat Produk Lain</a>`;
  grid.innerHTML = "";
  grid.appendChild(el);
}

function stockUrgency(stock, soldOfStock){
  // soldOfStock: persentase terjual dari kuota flash sale (0-100)
  if (stock <= 0) return "out";
  if (soldOfStock >= 80) return "critical";
  if (soldOfStock >= 50) return "warn";
  return "ok";
}

function renderGrid(){
  grid.innerHTML = "";

  if (!flashItems.length){
    renderEmpty("Belum ada flash sale", "Pantau terus, flash sale berikutnya akan muncul di sini.");
    resultCount.textContent = "";
    return;
  }

  resultCount.textContent = `${flashItems.length} produk flash sale`;

  flashItems.forEach((p, idx) => {
    const card = document.createElement("div");
    card.className = "flash-card";
    card.dataset.id = p.id;
    card.style.animationDelay = (idx * 40) + "ms";

    const stock = Number(p.flashSaleStock ?? p.stock ?? 0);
    const initialStock = Number(p.flashSaleInitialStock ?? stock || 1);
    const sold = Math.max(0, initialStock - stock);
    const soldPct = Math.min(100, Math.round((sold / initialStock) * 100));
    const urgency = stockUrgency(stock, soldPct);

    const normalPrice = p.originalPrice || p.price || 0;
    const salePrice = p.flashSalePrice || p.price || 0;
    const discPct = normalPrice > salePrice ? Math.round((1 - salePrice / normalPrice) * 100) : 0;

    const cardImg = p.image || p.imageUrl || (Array.isArray(p.images) && p.images[0]) || "";
    const isOut = urgency === "out";

    card.innerHTML = `
      <div class="fc-media">
        ${cardImg ? `<img src="${cardImg}" alt="${(p.name||'').replace(/"/g,'')}" loading="lazy">` : `<div class="fc-ph">⚡</div>`}
        ${discPct > 0 ? `<span class="fc-disc">-${discPct}%</span>` : ``}
        ${urgency === "critical" ? `<span class="fc-hot">🔥 Hampir Habis</span>` : ``}
        ${isOut ? `<div class="fc-overlay-out">STOK HABIS</div>` : ``}
      </div>
      <div class="fc-body">
        <span class="fc-category">${p.category || "Flash Sale"}</span>
        <h3 class="fc-name">${p.name || "Produk tanpa nama"}</h3>
        <div class="fc-price-row">
          <span class="fc-price">${fmtPrice(salePrice)}</span>
          ${normalPrice > salePrice ? `<span class="fc-price-old">${fmtPrice(normalPrice)}</span>` : ``}
        </div>
        <div class="fc-stock-row">
          <div class="fc-stock-track"><div class="fc-stock-fill ${urgency}" style="width:${Math.max(4,soldPct)}%"></div></div>
          <span class="fc-stock-label ${urgency}">${isOut ? "Habis" : `Terjual ${soldPct}%`}</span>
        </div>
        <button class="fc-btn-cart" data-id="${p.id}" ${isOut ? "disabled":""}>
          ${isOut ? "Stok Habis" : "⚡ Sambar Sekarang"}
        </button>
      </div>
    `;
    grid.appendChild(card);
  });
}

/* =========================================================
   ADD TO CART (flash sale price)
========================================================= */
function resolveImage(p){
  return p.image || p.imageUrl || (Array.isArray(p.images) && p.images[0]) || "";
}

async function addToCart(product, btn){
  if (!currentUser){
    showToast("Silakan masuk untuk membeli", true);
    setTimeout(()=> window.location.href = "login.html", 900);
    return;
  }
  const original = btn.textContent;
  btn.disabled = true;
  btn.textContent = "...";

  try{
    const ref = doc(db, "users", currentUser.uid, "cart", product.id);
    const existing = await getDoc(ref);
    const salePrice = product.flashSalePrice || product.price || 0;

    if (existing.exists()){
      await setDoc(ref, { quantity: increment(1), updatedAt: serverTimestamp() }, { merge:true });
    } else {
      await setDoc(ref, {
        productId: product.id,
        name: product.name || "",
        price: salePrice,
        originalPrice: product.originalPrice || product.price || 0,
        image: resolveImage(product),
        category: product.category || "",
        flashSale: true,
        quantity: 1,
        addedAt: serverTimestamp()
      });
    }

    btn.textContent = "✓ Ditambahkan";
    showToast(`${product.name} masuk keranjang dengan harga flash sale!`);
  }catch(e){
    console.error(e);
    showToast("Gagal menambah ke keranjang", true);
    btn.textContent = original;
  }finally{
    setTimeout(()=>{
      btn.disabled = false;
      btn.textContent = original;
    }, 1400);
  }
}

grid?.addEventListener("click", (e) => {
  const cartBtn = e.target.closest(".fc-btn-cart");
  const card = e.target.closest(".flash-card");
  if (!card) return;

  const product = flashItems.find(p => p.id === card.dataset.id);
  if (!product) return;

  if (cartBtn){
    e.stopPropagation();
    if (!cartBtn.disabled) addToCart(product, cartBtn);
    return;
  }
  window.location.href = `detail-produk.html?id=${product.id}`;
});

/* =========================================================
   NOTIFIKASI FLASH SALE
   Disimpan di: users/{uid}.flashSaleNotif (boolean)
========================================================= */
async function checkNotifStatus(){
  if (!currentUser){
    notifBtn.classList.remove("active");
    notifBtn.querySelector(".notif-text").textContent = "Aktifkan Notifikasi";
    return;
  }
  try{
    const snap = await getDoc(doc(db, "users", currentUser.uid));
    notifEnabled = !!(snap.exists() && snap.data().flashSaleNotif);
    updateNotifUI();
  }catch(e){
    console.error(e);
  }
}

function updateNotifUI(){
  notifBtn.classList.toggle("active", notifEnabled);
  notifBtn.querySelector(".notif-text").textContent = notifEnabled
    ? "Notifikasi Aktif"
    : "Aktifkan Notifikasi";
  notifBtn.querySelector(".notif-icon").textContent = notifEnabled ? "🔔" : "🔕";
}

notifBtn?.addEventListener("click", async () => {
  if (!currentUser){
    showToast("Silakan masuk untuk mengaktifkan notifikasi", true);
    setTimeout(()=> window.location.href = "login.html", 900);
    return;
  }
  try{
    notifEnabled = !notifEnabled;
    await setDoc(doc(db, "users", currentUser.uid), {
      flashSaleNotif: notifEnabled,
      flashSaleNotifUpdatedAt: serverTimestamp()
    }, { merge: true });
    updateNotifUI();
    showToast(notifEnabled
      ? "🔔 Kamu akan diberi tahu saat flash sale baru dimulai"
      : "🔕 Notifikasi flash sale dimatikan");
  }catch(e){
    console.error(e);
    notifEnabled = !notifEnabled;
    showToast("Gagal memperbarui notifikasi", true);
  }
});

/* =========================================================
   IN-PAGE "LIVE" NOTIFICATION TICKER
   Mensimulasikan notifikasi pembelian real-time dari Firestore
   listener pada koleksi products yang flashSale:true (field sold)
========================================================= */
function startLiveTicker(){
  const col = collection(db, "products");
  const q = query(col, where("flashSale", "==", true), limit(60));

  onSnapshot(q, (snap) => {
    snap.docChanges().forEach(change => {
      if (change.type === "modified"){
        const d = change.doc.data();
        const stock = Number(d.flashSaleStock ?? d.stock ?? 0);
        if (stock > 0 && stock <= 5){
          pushLiveNotif(`⚡ "${d.name || 'Produk'}" tersisa ${stock} stok!`);
        }
      }
    });
  }, (err) => console.error("listener flash sale error:", err));
}

function pushLiveNotif(msg){
  const wrap = document.getElementById("liveTicker");
  const item = document.createElement("div");
  item.className = "live-notif";
  item.textContent = msg;
  wrap.appendChild(item);
  setTimeout(() => item.remove(), 5000);
}

/* =========================================================
   INIT
========================================================= */
loadFlashSale();
startLiveTicker();

// expose untuk tombol "muat ulang" di empty state bila perlu
window.__reloadFlashSale = loadFlashSale;
</script>

.fc-hot{
  position:absolute;top:10px;right:10px;z-index:2;
  background:rgba(255,122,69,.18);color:var(--warn);border:1px solid rgba(255,122,69,.4);
  font-family:var(--font-mono);font-size:10px;font-weight:700;padding:4px 8px;border-radius:6px;
}
.fc-overlay-out{
  position:absolute;inset:0;background:rgba(5,7,11,.72);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--text-faint);
  letter-spacing:2px;z-index:3;
}
.fc-body{padding:14px;display:flex;flex-direction:column;gap:8px;flex:1;}
.fc-category{
  font-family:var(--font-mono);font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;
  color:var(--accent-2);
}
.fc-name{
  font-size:14px;font-weight:600;line-height:1.35;color:var(--text);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:38px;
}
.fc-price-row{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
.fc-price{font-family:var(--font-mono);font-weight:700;font-size:16px;color:var(--flash);}
.fc-price-old{font-family:var(--font-mono);font-size:11.5px;color:var(--text-faint);text-decoration:line-through;}

.fc-stock-row{display:flex;align-items:center;gap:8px;}
.fc-stock-track{flex:1;height:6px;border-radius:99px;background:var(--bg-soft);overflow:hidden;}
.fc-stock-fill{height:100%;border-radius:99px;transition:width .4s ease;}
.fc-stock-fill.ok{background:var(--good);}
.fc-stock-fill.warn{background:var(--warn);}
.fc-stock-fill.critical{background:var(--flash);}
.fc-stock-fill.out{background:var(--text-faint);}
.fc-stock-label{font-family:var(--font-mono);font-size:10.5px;flex-shrink:0;}
.fc-stock-label.ok{color:var(--good);}
.fc-stock-label.warn{color:var(--warn);}
.fc-stock-label.critical{color:var(--flash);}
.fc-stock-label.out{color:var(--text-faint);}

.fc-btn-cart{
  margin-top:auto;
  font-family:var(--font-body);font-size:13px;font-weight:700;color:#0a0d13;
  background:linear-gradient(135deg, var(--flash), #ff7a9c);
  border:none;padding:11px 0;border-radius:10px;
  cursor:pointer;transition:.18s ease;
}
.fc-btn-cart:hover{filter:brightness(1.08);transform:translateY(-1px);}
.fc-btn-cart:disabled{background:var(--border);color:var(--text-faint);cursor:not-allowed;transform:none;}

/* ---------- skeletons ---------- */
.skeleton-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;
}
.skeleton-media{aspect-ratio:4/3;background:var(--surface-2);animation:pulse 1.4s ease infinite;}
.skeleton-lines{padding:14px;display:flex;flex-direction:column;gap:8px;}
.skeleton-line{height:10px;border-radius:5px;background:var(--surface-2);animation:pulse 1.4s ease infinite;}
.skeleton-line.w40{width:40%;}
.skeleton-line.w60{width:60%;}
.skeleton-line.w80{width:80%;}

/* ---------- empty state ---------- */
.empty-state{
  grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--text-muted);
}
.empty-icon{font-size:40px;margin-bottom:14px;}
.empty-state h3{font-family:var(--font-display);font-size:18px;color:var(--text);margin-bottom:6px;}
.empty-state p{font-size:13.5px;margin-bottom:18px;}
.btn-browse{
  display:inline-block;background:var(--accent-2);color:#0a0d13;
  font-weight:600;font-size:13px;padding:10px 22px;border-radius:999px;
}

/* ---------- toast ---------- */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surface-2);border:1px solid var(--border);color:var(--text);
  padding:13px 20px;border-radius:11px;font-size:13.5px;z-index:100;
  opacity:0;pointer-events:none;transition:.25s ease;box-shadow:0 14px 30px -12px rgba(0,0,0,0.5);
  display:flex;align-items:center;gap:10px;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast .dot{width:7px;height:7px;border-radius:50%;background:var(--good);flex:0 0 auto;}
.toast.err .dot{background:var(--danger);}

.footer{
  position:relative;z-index:1;text-align:center;padding:30px 20px 40px;
  color:var(--text-faint);font-size:12px;font-family:var(--font-mono);
  border-top:1px solid var(--border-soft);
}

/* ---------- responsive ---------- */
@media (max-width:880px){
  .hero-banner{padding:28px 20px 8px;}
  .content{padding:16px 20px 50px;}
  .flash-grid{grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));gap:13px;}
  .topbar-inner{padding:12px 20px;}
}
@media (max-width:560px){
  .flash-hero{flex-direction:column;align-items:flex-start;padding:22px 18px;}
  .fh-title{font-size:24px;}
  .cd-wrap{width:100%;justify-content:center;}
  .cd-box{min-width:52px;padding:8px 10px;}
  .cd-box .num{font-size:20px;}
  .flash-grid{grid-template-columns:repeat(2, 1fr);gap:10px;}
  .fc-name{font-size:13px;min-height:34px;}
  .notif-bar{justify-content:center;}
}
</style>
</head>
<body>

<div class="grid-overlay"></div>
<div class="glow-flash"></div>
<div class="glow-b"></div>

<div id="liveTicker"></div>

<header class="topbar">
  <div class="topbar-inner">
    <a class="logo" href="dashboard.html#dashboard">RAPI<span>STORE</span></a>
    <nav class="topbar-actions">
      <a class="icon-btn" href="dashboard.html#dashboard" title="Dashboard">⌂</a>
      <a class="icon-btn" href="marketplace.html#marketplace" title="Marketplace">▦</a>
    </nav>
  </div>
</header>

<!-- HERO + COUNTDOWN -->
<section class="hero-banner fade-up">
  <div class="flash-hero" id="heroBanner">
    <div class="fh-title-wrap">
      <p class="fh-eyebrow">FLASH SALE</p>
      <h1 class="fh-title">Diskon Gila-Gilaan,<br>Stok Terbatas!</h1>
      <p class="fh-sub">Harga spesial cuma berlaku selama waktu countdown ini. Begitu stok habis, harga balik normal.</p>
    </div>

    <div class="cd-wrap">
      <div class="cd-label" id="cdLabel">Memuat waktu...</div>
      <div class="cd-box"><div class="num" id="cdHours">00</div><div class="unit">JAM</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-box"><div class="num" id="cdMinutes">00</div><div class="unit">MENIT</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-box"><div class="num" id="cdSeconds">00</div><div class="unit">DETIK</div></div>
    </div>
  </div>
</section>

<!-- NOTIF -->
<div class="notif-bar">
  <button class="notif-btn" id="notifBtn">
    <span class="notif-icon">🔕</span>
    <span class="notif-text">Aktifkan Notifikasi</span>
  </button>
</div>

<main class="content">
  <div class="section-head">
    <h2>⚡ Produk Flash Sale</h2>
    <span class="result-count" id="resultCount"></span>
  </div>

  <div class="flash-grid" id="flashGrid"></div>
</main>

<footer class="footer">© 2026 RAPI STORE — Sambar diskonnya sebelum kehabisan.</footer>

<div class="toast" id="toast"><span class="dot"></span><span id="toastMsg"></span></div>

</body>
</html>
