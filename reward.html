<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Daily Reward — RAPI STORE</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #06080F;
    --surface: #0C1120;
    --s2:      #111828;
    --s3:      #161F30;
    --text:    #E6EAF4;
    --muted:   #6B7A96;
    --gold:    #F0A500;
    --gold2:   #FFD166;
    --green:   #3FD68F;
    --radius:  14px;
    --ease:    cubic-bezier(.4,0,.2,1);
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 15px;
    line-height: 1.6; min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Keyframes ── */
  @keyframes shimmer {
    0%   { background-position: -200% center; }
    100% { background-position:  200% center; }
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes float {
    0%,100% { transform:translateY(0) rotate(-2deg); }
    50%     { transform:translateY(-10px) rotate(2deg); }
  }
  @keyframes pop {
    0%   { transform:scale(1); }
    40%  { transform:scale(1.18); }
    70%  { transform:scale(.93); }
    100% { transform:scale(1); }
  }
  @keyframes confetti-fall {
    0%   { transform:translateY(-20px) rotate(0deg); opacity:1; }
    100% { transform:translateY(120px) rotate(720deg); opacity:0; }
  }
  @keyframes ring-pulse {
    0%   { box-shadow:0 0 0 0 rgba(63,214,143,.5); }
    70%  { box-shadow:0 0 0 16px rgba(63,214,143,0); }
    100% { box-shadow:0 0 0 0 rgba(63,214,143,0); }
  }
  @keyframes bar {
    from { width:0%; }
  }
  @keyframes glow-pulse {
    0%,100% { text-shadow:0 0 12px rgba(240,165,0,.4); }
    50%     { text-shadow:0 0 28px rgba(240,165,0,.9); }
  }

  /* ── Nav ── */
  nav {
    position:sticky; top:0; z-index:100;
    background:rgba(6,8,15,.9); backdrop-filter:blur(18px);
    border-bottom:1px solid rgba(255,255,255,.06); padding:0 20px;
  }
  .nav-inner {
    max-width:720px; margin:0 auto;
    display:flex; align-items:center; justify-content:space-between; height:56px;
  }
  .nav-brand {
    font-family:'Poppins',sans-serif; font-weight:800; font-size:18px;
    background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold));
    background-size:200% auto;
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:shimmer 3s linear infinite; text-decoration:none;
  }
  .nav-links { display:flex; gap:4px; }
  .nav-links a {
    color:var(--muted); font-size:13px; font-weight:500;
    text-decoration:none; padding:6px 14px; border-radius:8px;
    transition:.2s var(--ease);
  }
  .nav-links a:hover { color:var(--text); background:var(--s2); }

  /* ── Page ── */
  .page { max-width:720px; margin:0 auto; padding:28px 16px 80px; }

  /* ── Hero ── */
  .hero {
    position:relative; overflow:hidden;
    background:var(--surface); border-radius:22px;
    border:1.5px solid rgba(255,255,255,.07);
    padding:32px 24px 28px; margin-bottom:24px;
    text-align:center;
    animation:fadeUp .5s ease both;
  }
  .hero::before {
    content:''; position:absolute; inset:0;
    background:radial-gradient(ellipse at 50% 0%, rgba(240,165,0,.1) 0%, transparent 65%);
    pointer-events:none;
  }

  /* flame emoji */
  .flame {
    font-size:56px; display:block; margin-bottom:8px;
    animation:float 3s ease-in-out infinite;
  }
  .streak-num {
    font-family:'Poppins',sans-serif; font-weight:900; font-size:64px;
    color:var(--gold); line-height:1;
    animation:glow-pulse 2.5s ease-in-out infinite;
  }
  .streak-label {
    font-size:13px; color:var(--muted); margin-top:4px; margin-bottom:20px;
    font-weight:500; letter-spacing:.5px; text-transform:uppercase;
  }

  /* check-in btn */
  .btn-checkin {
    position:relative; overflow:hidden;
    width:100%; max-width:320px;
    padding:16px 24px; border:none; border-radius:var(--radius);
    font-family:'Poppins',sans-serif; font-weight:700; font-size:15px;
    cursor:pointer; transition:.25s var(--ease);
    background:linear-gradient(90deg,#C47F00,var(--gold),var(--gold2),var(--gold),#C47F00);
    background-size:300% auto; color:#070400;
    letter-spacing:.3px;
  }
  .btn-checkin:hover:not(:disabled) {
    animation:shimmer 1.2s linear infinite;
    box-shadow:0 6px 28px rgba(240,165,0,.4); transform:translateY(-2px);
  }
  .btn-checkin:active:not(:disabled) { transform:scale(.97); }
  .btn-checkin:disabled {
    background:var(--s2); color:var(--muted);
    cursor:not-allowed; box-shadow:none;
  }
  .btn-checkin.done {
    background:rgba(63,214,143,.15); color:var(--green);
    border:1.5px solid rgba(63,214,143,.3);
    animation:none;
  }

  .checkin-sub {
    font-size:12px; color:var(--muted); margin-top:10px;
  }
  .checkin-sub span { color:var(--green); font-weight:600; }

  /* ── Section label ── */
  .sec-label {
    font-family:'Poppins',sans-serif; font-weight:700;
    font-size:11px; letter-spacing:2px; text-transform:uppercase;
    color:var(--muted); margin-bottom:14px;
  }

  /* ── Milestone cards ── */
  .milestones { margin-bottom:28px; animation:fadeUp .5s .1s ease both; }
  .milestone-list { display:flex; flex-direction:column; gap:10px; }
  .ms-card {
    display:flex; align-items:center; gap:14px;
    background:var(--surface); border-radius:14px;
    border:1.5px solid rgba(255,255,255,.05);
    padding:16px 18px; transition:.2s var(--ease);
    position:relative; overflow:hidden;
  }
  .ms-card.reached {
    border-color:rgba(240,165,0,.35);
    background:rgba(240,165,0,.05);
  }
  .ms-card.reached::before {
    content:''; position:absolute; inset:0;
    background:linear-gradient(90deg,rgba(240,165,0,.04) 0%,transparent 60%);
    pointer-events:none;
  }
  .ms-icon {
    flex-shrink:0; width:46px; height:46px; border-radius:12px;
    display:grid; place-items:center; font-size:22px;
    background:var(--s2); border:1px solid rgba(255,255,255,.07);
    transition:.2s var(--ease);
  }
  .ms-card.reached .ms-icon {
    background:rgba(240,165,0,.12); border-color:rgba(240,165,0,.3);
  }
  .ms-info { flex:1; min-width:0; }
  .ms-info strong {
    font-family:'Poppins',sans-serif; font-weight:700; font-size:14px;
    display:block; margin-bottom:2px;
  }
  .ms-info .ms-bar-wrap {
    height:5px; border-radius:100px; background:rgba(255,255,255,.07);
    overflow:hidden; margin-top:6px;
  }
  .ms-info .ms-bar {
    height:100%; border-radius:100px;
    background:linear-gradient(90deg,var(--gold),var(--gold2));
    width:0%; animation:bar .8s .3s var(--ease) forwards;
    box-shadow:0 0 6px rgba(240,165,0,.4);
  }
  .ms-info .ms-sub { font-size:12px; color:var(--muted); margin-top:4px; }
  .ms-reward {
    flex-shrink:0; text-align:right;
  }
  .ms-reward .amt {
    font-family:'Poppins',sans-serif; font-weight:800; font-size:15px;
    color:var(--gold); display:block;
  }
  .ms-reward .ms-badge {
    display:inline-block; font-size:10px; font-weight:700;
    padding:2px 8px; border-radius:100px; margin-top:3px;
    letter-spacing:.4px; text-transform:uppercase;
  }
  .ms-badge.unlocked { background:rgba(63,214,143,.15); color:var(--green); }
  .ms-badge.locked   { background:rgba(255,255,255,.07); color:var(--muted); }

  /* ── Weekly grid ── */
  .weekly { margin-bottom:28px; animation:fadeUp .5s .15s ease both; }
  .week-grid {
    display:grid; grid-template-columns:repeat(7,1fr); gap:8px;
  }
  .day-cell {
    aspect-ratio:1; border-radius:10px;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:2px; font-size:10px; font-weight:600;
    background:var(--surface); border:1.5px solid rgba(255,255,255,.05);
    color:var(--muted); transition:.2s var(--ease);
  }
  .day-cell .d-num { font-size:14px; font-weight:700; color:var(--text); }
  .day-cell.checked {
    background:rgba(63,214,143,.1); border-color:rgba(63,214,143,.4);
    color:var(--green);
  }
  .day-cell.checked .d-num { color:var(--green); }
  .day-cell.today {
    border-color:var(--gold); background:rgba(240,165,0,.08);
  }
  .day-cell.today .d-num { color:var(--gold); }

  /* ── History ── */
  .history { animation:fadeUp .5s .2s ease both; }
  .history-list { display:flex; flex-direction:column; gap:8px; }
  .hist-item {
    display:flex; align-items:center; gap:12px;
    background:var(--surface); border-radius:12px;
    padding:12px 16px; border:1px solid rgba(255,255,255,.05);
  }
  .hist-dot {
    width:8px; height:8px; border-radius:50%;
    background:var(--green); flex-shrink:0;
  }
  .hist-date { flex:1; font-size:13px; color:var(--text); }
  .hist-streak { font-size:12px; color:var(--gold); font-weight:600; }

  .empty-hist {
    text-align:center; padding:32px 0; color:var(--muted); font-size:13px;
  }
  .empty-hist span { font-size:32px; display:block; margin-bottom:8px; }

  /* ── Confetti ── */
  .confetti-wrap {
    position:fixed; top:0; left:0; width:100%; height:100%;
    pointer-events:none; z-index:999; overflow:hidden;
  }
  .confetti-wrap.hidden { display:none; }
  .conf-piece {
    position:absolute; top:-20px;
    font-size:18px;
    animation:confetti-fall .9s var(--ease) forwards;
  }

  /* ── Toast ── */
  #toast {
    position:fixed; bottom:24px; left:50%;
    transform:translateX(-50%) translateY(80px);
    background:var(--s2); border:1px solid rgba(240,165,0,.3);
    color:var(--text); padding:12px 24px; border-radius:100px;
    font-size:13px; font-weight:500;
    box-shadow:0 8px 32px rgba(0,0,0,.5);
    transition:transform .35s var(--ease), opacity .35s;
    opacity:0; z-index:998; white-space:nowrap;
  }
  #toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

  /* ── Spin loader ── */
  .spin-wrap { display:flex; justify-content:center; padding:60px 0; }
  .ring { width:36px; height:36px; border-radius:50%; border:3px solid rgba(255,255,255,.08); border-top-color:var(--gold); animation:spin .7s linear infinite; }

  /* ── Divider ── */
  .divider { height:1px; background:rgba(255,255,255,.05); margin:24px 0; }
</style>
</head>
<body>

<!-- Nav -->
<nav>
  <div class="nav-inner">
    <a class="nav-brand" href="#">✦ RAPI STORE</a>
    <div class="nav-links">
      <a href="dashboard.html#dashboard">Dashboard</a>
      <a href="profil.html#profil">Profil</a>
    </div>
  </div>
</nav>

<!-- Confetti -->
<div class="confetti-wrap hidden" id="confetti"></div>

<div class="page" id="pageRoot">
  <div class="spin-wrap"><div class="ring"></div></div>
</div>

<div id="toast"></div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, doc, getDoc, setDoc, updateDoc,
    collection, query, orderBy, limit, getDocs, serverTimestamp, Timestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyBJJjcICAkbVWjrw5-zYMzcKqPGhS0nS0I",
    authDomain:        "piwstore.firebaseapp.com",
    projectId:         "piwstore",
    storageBucket:     "piwstore.firebasestorage.app",
    messagingSenderId: "419258630997",
    appId:             "1:419258630997:web:aefc0e34cc4b7ca16d25dc",
    measurementId:     "G-M6NHQMHQV4"
  };

  const app  = initializeApp(firebaseConfig);
  const db   = getFirestore(app);
  const auth = getAuth(app);

  /* ─── Milestones ─── */
  const MILESTONES = [
    { days:7,   reward:'Rp 10.000', amt:10000,  icon:'🔥' },
    { days:30,  reward:'Rp 50.000', amt:50000,  icon:'⚡' },
    { days:100, reward:'Rp 200.000',amt:200000, icon:'👑' },
  ];

  /* ─── Helpers ─── */
  function todayStr() {
    return new Date().toISOString().slice(0, 10); // YYYY-MM-DD
  }
  function fmtDate(ts) {
    const d = ts?.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
  }
  function rupiah(n) {
    return 'Rp ' + Number(n).toLocaleString('id-ID');
  }

  /* ─── Confetti burst ─── */
  function burst() {
    const wrap = document.getElementById('confetti');
    wrap.classList.remove('hidden');
    wrap.innerHTML = '';
    const pieces = ['🎉','✨','🌟','💛','🎊','⭐','🔥'];
    for (let i = 0; i < 22; i++) {
      const el = document.createElement('span');
      el.className = 'conf-piece';
      el.textContent = pieces[Math.floor(Math.random() * pieces.length)];
      el.style.left  = Math.random() * 100 + '%';
      el.style.animationDelay = Math.random() * .5 + 's';
      el.style.fontSize = (14 + Math.random() * 14) + 'px';
      wrap.appendChild(el);
    }
    setTimeout(() => { wrap.classList.add('hidden'); wrap.innerHTML = ''; }, 1800);
  }

  /* ─── Toast ─── */
  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  /* ─── Render page ─── */
  function renderPage(streak, checkedToday, history, uid) {
    const today = todayStr();

    // weekly grid: last 7 days
    const checkedSet = new Set(history.map(h => h.date));
    const weekCells = Array.from({length:7}, (_, i) => {
      const d = new Date();
      d.setDate(d.getDate() - (6 - i));
      const ds = d.toISOString().slice(0,10);
      const day = d.toLocaleDateString('id-ID',{weekday:'short'});
      const num = d.getDate();
      const isToday   = ds === today;
      const isChecked = checkedSet.has(ds);
      return `<div class="day-cell ${isChecked?'checked':''} ${isToday&&!isChecked?'today':''}">
        <span>${day}</span>
        <span class="d-num">${isChecked ? '✓' : num}</span>
      </div>`;
    }).join('');

    // milestones
    const msCards = MILESTONES.map(m => {
      const reached = streak >= m.days;
      const pct = Math.min(100, Math.round((streak / m.days) * 100));
      return `
      <div class="ms-card ${reached?'reached':''}">
        <div class="ms-icon">${m.icon}</div>
        <div class="ms-info">
          <strong>${m.days} Hari Streak</strong>
          <div class="ms-bar-wrap">
            <div class="ms-bar" style="--w:${pct}%;width:var(--w)"></div>
          </div>
          <div class="ms-sub">${Math.min(streak,m.days)} / ${m.days} hari</div>
        </div>
        <div class="ms-reward">
          <span class="amt">${m.reward}</span>
          <span class="ms-badge ${reached?'unlocked':'locked'}">${reached?'✓ Terbuka':'🔒 Terkunci'}</span>
        </div>
      </div>`;
    }).join('');

    // history (last 10)
    const histItems = history.length === 0
      ? `<div class="empty-hist"><span>📅</span>Belum ada riwayat check-in.</div>`
      : history.slice(0,10).map((h,i) => `
        <div class="hist-item">
          <div class="hist-dot"></div>
          <div class="hist-date">${fmtDate(h.ts)}</div>
          <div class="hist-streak">🔥 ${h.streak} hari</div>
        </div>`).join('');

    const nextMilestone = MILESTONES.find(m => streak < m.days);
    const subText = checkedToday
      ? `Kembali besok untuk melanjutkan streak!`
      : nextMilestone
        ? `${nextMilestone.days - streak} hari lagi menuju milestone <span>${nextMilestone.reward}</span>`
        : `Streak luar biasa! Kamu sudah melewati semua milestone! 🏆`;

    document.getElementById('pageRoot').innerHTML = `
      <!-- Hero -->
      <div class="hero">
        <span class="flame">🔥</span>
        <div class="streak-num" id="streakNum">${streak}</div>
        <div class="streak-label">Hari Streak</div>
        <button class="btn-checkin ${checkedToday?'done':''}" id="btnCheckin"
          onclick="window._doCheckin()" ${checkedToday?'disabled':''}>
          ${checkedToday ? '✓ Sudah Check-in Hari Ini' : '⚡ Check-in Sekarang'}
        </button>
        <div class="checkin-sub">${subText}</div>
      </div>

      <!-- Weekly -->
      <div class="weekly">
        <p class="sec-label">7 Hari Terakhir</p>
        <div class="week-grid">${weekCells}</div>
      </div>

      <div class="divider"></div>

      <!-- Milestones -->
      <div class="milestones">
        <p class="sec-label">Milestone Reward</p>
        <div class="milestone-list">${msCards}</div>
      </div>

      <div class="divider"></div>

      <!-- History -->
      <div class="history">
        <p class="sec-label">Riwayat Check-in</p>
        <div class="history-list" id="histList">${histItems}</div>
      </div>
    `;

    /* ─── Check-in handler ─── */
    window._doCheckin = async () => {
      const btn = document.getElementById('btnCheckin');
      btn.disabled = true;
      btn.textContent = '⏳ Memproses...';

      try {
        const userRef  = doc(db, 'users', uid);
        const snap     = await getDoc(userRef);
        const data     = snap.exists() ? snap.data() : {};
        const lastDate = data.lastCheckin || '';
        const today2   = todayStr();

        if (lastDate === today2) {
          toast('Kamu sudah check-in hari ini!');
          btn.textContent = '✓ Sudah Check-in Hari Ini';
          btn.classList.add('done');
          return;
        }

        // cek apakah kemarin check-in (streak lanjut atau reset)
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yStr = yesterday.toISOString().slice(0,10);
        const newStreak = (lastDate === yStr) ? (data.streakCount || 0) + 1 : 1;

        // update user doc
        await updateDoc(userRef, {
          lastCheckin: today2,
          streakCount: newStreak,
        });

        // simpan ke subcollection checkinHistory
        const histRef = doc(collection(db, 'users', uid, 'checkinHistory'));
        await setDoc(histRef, {
          date:   today2,
          streak: newStreak,
          ts:     serverTimestamp(),
        });

        burst();
        toast(`🔥 Check-in berhasil! Streak: ${newStreak} hari`);

        // update UI
        document.getElementById('streakNum').textContent = newStreak;
        btn.textContent = '✓ Sudah Check-in Hari Ini';
        btn.classList.add('done');

        // cek milestone
        const hit = MILESTONES.find(m => m.days === newStreak);
        if (hit) {
          setTimeout(() => toast(`🏆 Milestone! Streak ${hit.days} hari — klaim ${hit.reward} ke admin!`), 1200);
        }

        // reload halaman setelah sebentar biar semua update
        setTimeout(() => location.reload(), 2200);

      } catch(e) {
        console.error(e);
        toast('Gagal check-in: ' + e.message);
        btn.disabled = false;
        btn.textContent = '⚡ Check-in Sekarang';
      }
    };
  }

  /* ─── Auth & load data ─── */
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      document.getElementById('pageRoot').innerHTML = `
        <div style="text-align:center;padding:60px 20px;color:var(--muted)">
          <div style="font-size:40px;margin-bottom:12px">🔒</div>
          <p style="font-family:Poppins;font-weight:700;font-size:16px;color:var(--text)">Belum Login</p>
          <p style="font-size:13px;margin-top:4px">Silakan login untuk check-in harian.</p>
        </div>`;
      return;
    }

    try {
      const uid     = user.uid;
      const snap    = await getDoc(doc(db, 'users', uid));
      const data    = snap.exists() ? snap.data() : {};
      const streak  = data.streakCount  || 0;
      const lastDay = data.lastCheckin  || '';
      const checked = lastDay === todayStr();

      // ambil history
      const hSnap = await getDocs(
        query(collection(db, 'users', uid, 'checkinHistory'), orderBy('ts','desc'), limit(10))
      );
      const history = hSnap.docs.map(d => ({ ...d.data(), id: d.id }));

      renderPage(streak, checked, history, uid);
    } catch(e) {
      console.error(e);
      document.getElementById('pageRoot').innerHTML = `
        <div style="text-align:center;padding:60px 20px;color:var(--muted)">
          <div style="font-size:40px;margin-bottom:12px">⚠️</div>
          <p style="font-family:Poppins;font-weight:700;font-size:16px;color:var(--text)">Gagal memuat data</p>
          <p style="font-size:13px;margin-top:4px">${e.message}</p>
        </div>`;
    }
  });
</script>
</body>
</html>
